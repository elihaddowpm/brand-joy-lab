/* =========================================================================
 * Brand Joy Lab — Intelligence Engine (v2 frontend)
 *
 * Parallel build alongside index.html. Backend contracts preserved:
 *   - /api/bjl-query (SSE orchestrator) — adds optional evidence event
 *   - /api/claude (Anthropic passthrough) — unchanged
 *
 * The deployed email system prompt (buildEmailSystem) is ported verbatim.

const { useState, useEffect, useRef, useCallback, useMemo } = React;

 * 1. PORTED UTILITIES — from the live deployed index.html, verbatim.

const sanitizeEmail = (text) => {
  return text
    // Strip https:// or http:// when followed by www. — the www-prefixed URL renders
    // as a clickable link in every email client and we avoid the model's habit of
    // autocapitalizing the protocol after a sentence-ending period.
    .replace(/\b[Hh]ttps?:\/\/(?=www\.)/g, '')
    // For the rare URL with https:// but no www. prefix, lowercase the protocol.
    .replace(/\bHttps:\/\//g, 'https://')
    .replace(/\bHttp:\/\//g, 'http://')
    .replace(/Won'tBow/g, "Won't Bow")
    .replace(/Won’tBow/g, "Won’t Bow")
    .replace(/^\*{1,2}\n/, '')
    .replace(/^\*{1,2}\s*/, '')
    .replace(/^(Subject:)\*{1,2}\s*/, '$1')
    .replace(/\.\s*,/g, '.')
    .replace(/\.\./g, '.')
    .replace(/ \. /g, '. ')
    .replace(/\. ([a-z])/g, (m, c) => '. ' + c.toUpperCase())
    .replace(/\.\s*,/g, '.')
    .replace(/\.\./g, '.')
    .replace(/\bJI=\d+\.?\d*/g, '')
    .replace(/a Joy Index of \d+\.?\d*/gi, 'a high joy score')
    .replace(/Joy Index of \d+\.?\d*/gi, 'high on the joy scale')
    .replace(/scores a \d+\.?\d* (on|for|in)/gi, 'scores highly $1')
    .replace(/\d+\.?\d* (on the [Jj]oy|on our [Jj]oy)/g, 'highly $1')
    .replace(/The high on the joy scale/gi, 'This high joy score')
    .replace(/\n(Ryan|Eli|Shannon|Dana|Chris|Tameka|Deandra|Mauricio|Pete|Stella|Nicole|Christina|Terri|Dustin|Drew|Jen|Carol|Amy|Tim|Luis|Stephen|Jim|Nate|Hiroshi|Jessica|Dan)\s*$/, '\n[Your name]');
};

const stripMarkers = (text) => text.replace(/[\[\(]\s*(?:BJL|CRED)\s*[\]\)]\s*\n?/gi, '');
const CRED_MARKER_RE = /[\[\(]\s*CRED\s*[\]\)]/i;

const validateCredentials = async (emailText, strategistCtx) => {
  if (!strategistCtx || !strategistCtx.trim()) return stripMarkers(emailText);
  if (!CRED_MARKER_RE.test(emailText)) {
    return stripMarkers(emailText);
  }
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 6000);
    const credMatch = emailText.match(/[\[\(]\s*CRED\s*[\]\)]\s*\n?([\s\S]*?)(?=\n\n[A-Z]|\nWould|\nWorth|\nBest|\nThanks|\[Your name\]|$)/i);
    if (!credMatch) return stripMarkers(emailText);
    const credParagraph = credMatch[1].trim();
    const prompt = 'APPROVED SOURCE MATERIAL — the only text you may draw from:\n---\n' + strategistCtx + '\n---\n\nAGENCY CREDENTIAL PARAGRAPH TO REWRITE:\n---\n' + credParagraph + '\n---\n\nTask: Rewrite this paragraph so every specific claim, client name, and credential comes directly from the APPROVED SOURCE MATERIAL above. You may paraphrase but must not add, invent, or imply anything not in the source material. Keep it to two sentences maximum — this is an intro email. Return only the rewritten paragraph — no markers, no commentary, no subject line.';
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: ctrl.signal,
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: 'You rewrite agency credential paragraphs to use only approved source material. Return only the rewritten paragraph.',
        messages: [{ role: 'user', content: prompt }]
      })
    });
    clearTimeout(timer);
    const cleanEmail = stripMarkers(emailText);
    if (!res.ok) return cleanEmail;
    const data = await res.json();
    const rewrittenCred = (data.content?.map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n') || '').trim();
    if (!rewrittenCred) return cleanEmail;
    return cleanEmail.replace(credParagraph, rewrittenCred);
  } catch(e) {
    return stripMarkers(emailText);
  }
};

/* =========================================================================
 * Case study library loader — inlined port of case_studies/case_study_loader.js.
 * Because index_v2.html runs under text/babel (not native ESM), the exported
 * functions from case_study_loader.js are mirrored here so Babel-transformed
 * code can call them directly. The standalone module file remains in the repo
 * as the canonical source of truth; keep this block in sync when that file
 * changes.
 * ========================================================================= */
let _caseStudyLibraryCache = null;
const loadCaseStudyLibrary = async () => {
  if (_caseStudyLibraryCache) return _caseStudyLibraryCache;
  const response = await fetch("/case_studies/library.json");
  if (!response.ok) throw new Error("Failed to load case study library: " + response.status);
  _caseStudyLibraryCache = await response.json();
  return _caseStudyLibraryCache;
};

const scoreCaseStudy = (caseStudy, prospectContext) => {
  let score = 0;
  const { category, pain_shape, pain_keywords = [], audience_hints = [], needs_current_proof, needs_quantitative_proof } = prospectContext;
  const allTags = [...(caseStudy.use_for_tags || [])];
  const allContext = [...(pain_keywords || []), ...(audience_hints || [])].map(s => s.toLowerCase());
  for (const tag of allTags) {
    const normalizedTag = tag.toLowerCase().replace(/_/g, " ");
    for (const ctx of allContext) {
      if (normalizedTag.includes(ctx) || ctx.includes(normalizedTag)) score += 2;
    }
  }
  if (category && caseStudy.use_for_narrative) {
    const narrative = caseStudy.use_for_narrative.toLowerCase();
    if (narrative.includes(category.toLowerCase())) score += 5;
  }
  if (pain_shape === "performance" && caseStudy.parallel_type === "process") score += 10;
  if (pain_shape === "brand" && caseStudy.parallel_type === "insight") score += 3;
  if (pain_shape === "brand" && caseStudy.parallel_type === "process") score -= 20;
  if (pain_shape === "performance" && caseStudy.parallel_type === "insight") score -= 10;
  if (needs_current_proof && (caseStudy.timing_frame === "current" || caseStudy.timing_frame === "brand_new")) score += 4;
  if (needs_quantitative_proof && caseStudy.results_type === "descriptive_only") score -= 15;
  return score;
};

const filterCaseStudies = async (prospectContext, maxCases = 3) => {
  const library = await loadCaseStudyLibrary();
  const scored = library.case_studies.map(cs => ({ case_study: cs, score: scoreCaseStudy(cs, prospectContext) }));
  scored.sort((a, b) => b.score - a.score);
  const topN = scored.slice(0, Math.max(maxCases, 2));
  if (scored.length > 0 && scored[0].score < 3) {
    const brandDefault = scored.find(s =>
      s.case_study.parallel_type === "insight" &&
      s.case_study.results_type === "quantitative" &&
      !topN.some(t => t.case_study.identifier === s.case_study.identifier)
    );
    if (brandDefault && topN.length < maxCases) topN.push(brandDefault);
  }
  return topN.map(s => s.case_study);
};

const formatSingleCaseStudy = (cs) => {
  const lines = [];
  lines.push("─── " + cs.client.toUpperCase() + " / " + cs.campaign.toUpperCase() + " ───");
  if (cs.url) lines.push("URL: " + cs.url);
  lines.push("Identifier: " + cs.identifier);
  lines.push("When: " + cs.when);
  lines.push("Situation: " + cs.situation);
  lines.push("Strategic move: " + cs.strategic_move);
  lines.push("Work: " + cs.work);
  lines.push("Results: " + cs.results);
  lines.push("Parallel type: " + cs.parallel_type + " (" + (cs.parallel_type === "process" ? "connect via process/discipline parallel, not insight parallel" : "connect via strategic insight parallel") + ")");
  if (cs.results_type === "descriptive_only") {
    lines.push("Results type: descriptive_only — do not cite numerical outcomes for this case; use strategic thinking and campaign name only.");
  }
  lines.push("Use for: " + cs.use_for_narrative);
  if (cs.relative_positioning) lines.push("Relative positioning: " + cs.relative_positioning);
  if (cs.email_usage_note) lines.push("EMAIL USAGE NOTE: " + cs.email_usage_note);
  if (cs.relationship_credential) lines.push("Relationship credential: " + cs.relationship_credential);
  return lines.join("\n");
};

const formatCaseStudiesForPrompt = (caseStudies) => {
  if (!caseStudies || caseStudies.length === 0) {
    return "No case studies pre-selected for this prospect. Use agency credentials only; do not fabricate case study references.";
  }
  const primary = caseStudies[0];
  const alternatives = caseStudies.slice(1);
  let output = "PRIMARY CASE STUDY (cite this one as the parallel reference in the email):\n\n";
  output += formatSingleCaseStudy(primary);
  if (alternatives.length > 0) {
    output += "\n\nOTHER CASE STUDIES THE FILTER CONSIDERED (do not cite these; shown only so you understand what was ranked below the primary and why):\n\n";
    output += alternatives.map(formatSingleCaseStudy).join("\n\n");
  }
  return output;
};

const extractProspectContext = ({ waldo, bjlInsights, strategistContext, prospectCategory }) => {
  const pain_keywords = [];
  const audience_hints = [];
  let pain_shape = "brand";
  let needs_current_proof = false;
  let needs_quantitative_proof = true;
  if (waldo) {
    const waldoText = JSON.stringify(waldo).toLowerCase();
    const performanceIndicators = ["roas", "cac", "attribution", "booking cost", "performance marketing",
      "conversion", "cost per", "media efficiency", "media waste", "measurement",
      "ceo pressure on revenue", "revenue pressure", "budget cut", "flat budget",
      "fragmented media", "multi-location", "portfolio", "multi-property"];
    const performanceHits = performanceIndicators.filter(term => waldoText.includes(term));
    if (performanceHits.length >= 2) pain_shape = "performance";
    else if (performanceHits.length === 1) pain_shape = "mixed";
    pain_keywords.push(...performanceHits);
    const brandIndicators = ["positioning", "repositioning", "brand refresh", "identity", "platform",
      "differentiation", "category", "audience shift", "rebrand", "tagline",
      "creative", "emotional territory", "perception", "resonance"];
    pain_keywords.push(...brandIndicators.filter(term => waldoText.includes(term)));
    const audienceIndicators = ["multicultural", "diverse audience", "black", "latino", "gen z", "millennial",
      "boomer", "family", "parents", "wellness", "luxury", "heritage",
      "performance marketing", "destination", "tourism", "cvb", "hospitality"];
    audience_hints.push(...audienceIndicators.filter(term => waldoText.includes(term)));
  }
  if (bjlInsights) {
    const bjlLower = bjlInsights.toLowerCase();
    const joyKeywords = ["escape", "discovery", "reconnection", "reset", "anticipation", "playful",
      "tranquil", "relational", "aspirational", "wonder", "belonging"];
    pain_keywords.push(...joyKeywords.filter(term => bjlLower.includes(term)));
  }
  return {
    category: prospectCategory || null,
    pain_shape,
    pain_keywords: [...new Set(pain_keywords)],
    audience_hints: [...new Set(audience_hints)],
    needs_current_proof,
    needs_quantitative_proof,
  };
};

    "1. HOOK — Open with something specific enough that the prospect knows you actually paid attention to their world. The Waldo signal is one possible source, but the goal is to demonstrate genuine curiosity about their work, not to surface a problem you assume they have. Avoid framing the hook as 'you must be dealing with X' or 'the brief on your desk is Y'. Lead instead with what is true and observable about their situation, paired with a question or an observation that invites conversation rather than offering a diagnosis. The hook earns the next sentence. It does not deliver a verdict.",
    "2. BJL BRIDGE — One behavioral observation from the consumer research. Express it as something you have been tracking that feels relevant to where they sit right now, not a statistic, not a finding, a behavioral truth. Keep it short. Let it raise a question in their mind, not answer one. It follows the hook. It supports the hook. It never replaces it.",
    "3. AGENCY CREDIBILITY — Brief credential paragraph using only client names from the strategist context.",
    "",
    "Output format: Subject line first, then email body. Structure the email body with these exact markers so each section can be identified: write the hook paragraph, then on its own line write the literal text [BJL] (square brackets), then the BJL bridge paragraph, then on its own line write the literal text [CRED] (square brackets), then the agency credential paragraph, then the close and sign-off. These markers will be stripped before delivery.",
  ].join("\n");

  const USER_OVERRIDE = [
    "",
    "STRUCTURE — the strategist has provided specific instructions for this email. Follow them as the structural guide. The absolute rules above still apply.",
    "",

  ].join("\n");

  return SAFETY_FLOOR + CASE_STUDY_LIBRARY + (hasOverride ? USER_OVERRIDE : DEFAULT_STRUCTURE);
};

const mapWaldoCategory = (cat) => {
  if (!cat) return '';
  const c = cat.toLowerCase();
  if (c.includes('sports') || c.includes('entertainment') || c.includes('live event')) return 'Sports & Entertainment';
  if (c.includes('motorsport') || c.includes('racing') || c.includes('nascar')) return 'Sports & Entertainment';
  if (c.includes('theme park') || c.includes('amusement') || c.includes('attraction')) return 'Travel & Tourism / Hospitality';
  if (c.includes('aquarium') || c.includes('zoo') || c.includes('conservation')) return 'Travel & Tourism / Hospitality';
  if (c.includes('heritage') || c.includes('cultural') || c.includes('tourism')) return 'Travel & Tourism / Hospitality';
  if (c.includes('hospitality') || c.includes('venue')) return 'Travel & Tourism / Hospitality';
  if (c.includes('food') || c.includes('beverage') || c.includes('restaurant')) return 'Food & Beverage / CPG';
  if (c.includes('financial') || c.includes('bank')) return 'Financial Services';
  if (c.includes('health') || c.includes('wellness')) return 'Health & Wellness';
  if (c.includes('tech') || c.includes('telecom')) return 'Technology / Telecom';
  if (c.includes('retail') || c.includes('grocery')) return 'Retail / Grocery';
  return 'Other';
};

const parseWaldoJSON = (text) => {
  const raw = JSON.parse(text);
  let accounts;
  if (Array.isArray(raw)) accounts = raw;
  else if (raw.accounts && Array.isArray(raw.accounts)) accounts = raw.accounts;
  else if (raw.company || raw.id) accounts = [raw];
  else throw new Error('No accounts array found and could not detect a single account object');
  accounts = accounts.map((a, i) => ({
    ...a,
    id: a.id || a.company || ('account_' + i),
    contacts: Array.isArray(a.contacts) ? a.contacts : (a.contact ? [a.contact] : []),
  }));
  return { pilot: raw.pilot || raw.company || 'Waldo Intelligence', accounts };
};

const buildWaldoSystemContext = (account) => {
  if (!account) return '';
  const lines = [];
  lines.push('=== WALDO PROSPECT INTELLIGENCE ===');
  lines.push('');
  const tension = account.creative_tension || account.top_signal?.why_it_matters || '';
  if (tension) {
    lines.push('STRATEGIC TENSION (primary brief — the problem BJL data must speak to):');
    lines.push(tension);
    lines.push('');
  }
  const urgency = account.top_signal?.urgency || 'Building';
  const urgencyGuidance = {
    'Now': 'The email should feel timely and anchored to something happening right now. Reference the top signal directly if it strengthens the outreach.',
    'Seasonal': 'Anchor the frame to the current moment without over-indexing on urgency.',
    'Building': 'Frame the opportunity as forward-looking. Do not imply a crisis that does not exist.',
  };
  lines.push('URGENCY: ' + urgency + ' — ' + (urgencyGuidance[urgency] || ''));
  lines.push('');
  if (account.top_signal) {
    lines.push('PRIMARY SIGNAL: ' + (account.top_signal.headline || ''));
    if (account.top_signal.detail) lines.push('Detail: ' + account.top_signal.detail);
    if (account.top_signal.exact_quote) {
      lines.push('EXACT QUOTE FROM THEIR LEADERSHIP: \"' + account.top_signal.exact_quote + '\"');
      lines.push('(If you use this quote, use it verbatim — these are their own words.)');
    }
    if (account.top_signal.why_it_matters) lines.push('Why it matters: ' + account.top_signal.why_it_matters);
  }
  lines.push('');
  const hook = account.sharpened_hook || account.suggested_hook || '';
  if (hook) {
    lines.push('SHARPENED HOOK (directional — find your own expression grounded in BJL data):');
    lines.push(hook);
    lines.push('');
  }
  if (account.petermayer_relevance) {
    lines.push('PETERMAYER POSITIONING FOR THIS ACCOUNT:');
    lines.push(account.petermayer_relevance);
    lines.push('');
  }
  const deepSignals = account.deep_signals || [];
  if (deepSignals.length) {
    lines.push('DEEP SIGNALS (background intelligence — use to inform which BJL findings are most relevant):');
    deepSignals.forEach(s => {
      lines.push('  [' + (s.signal_type || 'Signal') + '] ' + (s.headline || ''));
      if (s.exact_quote) lines.push('    Exact quote: \"' + s.exact_quote + '\"');
      if (s.why_it_matters) lines.push('    Why it matters: ' + s.why_it_matters);
    });
  }
  lines.push('');
  lines.push('=== END WALDO INTELLIGENCE ===');
  return lines.join('\n');
};

  <script type="text/babel" data-presets="env,react">
/* =========================================================================
 * 2. parseBatchFile — ported verbatim from the live deploy (CSV + XLSX).
 * ========================================================================= */
const parseBatchFile = (file) => {
  return new Promise((resolve, reject) => {
    const isXLSX = file.name.match(/\.xlsx?$/i);
    const reader = new FileReader();
    const extractContacts = (headers, rows) => {
      const h = headers.map(hh => String(hh || "").toLowerCase().trim());
      const find = (...terms) => h.findIndex(hh => terms.some(t => hh.includes(t)));
      const fullNameIdx = find("full name");
      const firstNameIdx = find("first name", "firstname");
      const lastNameIdx = find("last name", "lastname");
      const titleIdx = find("title", "role", "position");
      const companyIdx = find("company", "org", "account");
      const emailIdx = find("email");
      const descIdx = find("description", "desc");
      const industriesIdx = find("industries", "industry", "sector");
      const brandsIdx = find("associated brands", "brands");
      const contextIdx = find("context", "notes", "intel");
      const hasName = fullNameIdx >= 0 || firstNameIdx >= 0;
      if (!hasName && companyIdx < 0) throw new Error("Could not find Name or Company columns. Headers: " + h.slice(0,10).join(", "));
      return rows.map(vals => {
        const get = (i) => i >= 0 && vals[i] != null ? String(vals[i]).trim() : "";
        const name = get(fullNameIdx) || [get(firstNameIdx), get(lastNameIdx)].filter(Boolean).join(" ");
        const ctxParts = [
          get(descIdx) ? "About: " + get(descIdx) : "",
          get(industriesIdx) ? "Industries: " + get(industriesIdx) : "",
          get(brandsIdx) ? "Brands: " + get(brandsIdx) : "",
          get(contextIdx),
        ].filter(Boolean);
        return { name, company: get(companyIdx), role: get(titleIdx), email: get(emailIdx), context: ctxParts.join(" | ") };
      }).filter(c => c.name || c.company);
    };
    if (isXLSX) {
      reader.onload = (e) => {
        try {
          if (!window.XLSX) { reject("SheetJS not loaded — try refreshing the page."); return; }
          const wb = window.XLSX.read(e.target.result, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
          const nonEmpty = data.filter(r => r.some(c => c !== ""));
          if (nonEmpty.length < 2) { reject("Spreadsheet needs a header row and at least one contact."); return; }
          const contacts = extractContacts(nonEmpty[0], nonEmpty.slice(1));
          if (!contacts.length) { reject("No contacts found after the header row."); return; }
          resolve(contacts);
        } catch (err) { reject("Could not parse Excel file: " + err.message); }
      };
      reader.onerror = () => reject("File read error");
      reader.readAsArrayBuffer(file);
      return;
    }
    reader.onload = (e) => {
      try {
        const parseCSVLine = (line) => {
          const cols = []; let cur = "", inQ = false;
          for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"' && !inQ) inQ = true;
            else if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
            else if (c === '"' && inQ) inQ = false;
            else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
            else cur += c;
          }
          cols.push(cur.trim());
          return cols;
        };
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) { reject("File needs a header row and at least one contact."); return; }
        const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().replace(/['"]/g,"").trim());
        const contacts = extractContacts(headers, lines.slice(1).map(parseCSVLine));
        if (!contacts.length) { reject("No contacts found after the header row."); return; }
        resolve(contacts);
      } catch (err) { reject("Could not parse file: " + err.message); }
    };
    reader.onerror = () => reject("File read error");
    reader.readAsText(file);
  });
};

/* =========================================================================
 * 3. queryBJL / investigateQuery — async job-queue clients.
 *
 * V2 was originally written against an SSE backend that emitted streaming
 * status / chunk / evidence / investigation_note events. The current backend
 * uses an enqueue + poll architecture (see netlify/functions/bjl-query*.js):
 *   - POST /api/bjl-query                  -> { job_id }, HTTP 202
 *   - GET  /api/bjl-query-status?id=<id>   -> { status, finding, scratch, ... }
 *   - status flips: pending -> running -> complete | error
 *
 * To preserve V2's UI contract (phase pill, evidence drawer, accumulating
 * chunk handlers, investigation notes), these clients enqueue a job and poll,
 * synthesizing V2's expected event stream from polled state. Streaming text
 * is collapsed to one onChunk(finding) emitted at the end — same trade as
 * the V1 frontend, accepted for correctness on long queries.
 * ========================================================================= */

// Shared poll helper. Polls /api/bjl-query-status until terminal state.
// Calls onTransition(job) once per status change. Returns the terminal job row.
const _bjlPollJob = async (jobId, signal, opts = {}) => {
  const pollIntervalMs = opts.pollIntervalMs || 2000;
  const hardCapMs = opts.hardCapMs || 5 * 60 * 1000;
  const onTransition = opts.onTransition || (() => {});
  const onPollError = opts.onPollError || (() => {});
  const startedAt = Date.now();
  let lastStatus = "pending";
  while (true) {
    if (signal && signal.aborted) {
      const e = new Error("Aborted"); e.phase = "abort"; e.job_id = jobId; throw e;
    }
    if (Date.now() - startedAt > hardCapMs) {
      const e = new Error("Query exceeded " + Math.round(hardCapMs / 1000) + "s without completing.");
      e.phase = "timeout"; e.job_id = jobId; throw e;
    }
    await new Promise(r => setTimeout(r, pollIntervalMs));
    let res;
    try { res = await fetch("/api/bjl-query-status?id=" + encodeURIComponent(jobId), { signal }); }
    catch (err) { onPollError({ phase: "poll_network", message: err.message }); continue; }
    if (!res.ok) { onPollError({ phase: "poll_http", status: res.status }); continue; }
    let job;
    try { job = await res.json(); } catch { continue; }
    if (job.status !== lastStatus) { lastStatus = job.status; try { onTransition(job); } catch (e) { console.error("[poll] onTransition threw:", e); } }
    if (job.status === "complete" || job.status === "error") return job;
  }
};

// Map scratch entries to V2 evidence rows. Scratch is {query, rationale, result, rowcount}.
// V2's drawer expects { rows: [{ id, kind, body, meta }] }.
const _bjlScratchToEvidenceRows = (scratch) => {
  const arr = Array.isArray(scratch) ? scratch : [];
  return arr.map((s, i) => {
    const rowcount = (typeof s.rowcount === "number") ? s.rowcount : (Array.isArray(s.result) ? s.result.length : 0);
    const body = (s.rationale || "").slice(0, 280);
    const queryPreview = s.query ? (" · " + s.query.replace(/\s+/g, " ").slice(0, 200)) : "";
    const meta = "Q" + (i + 1) + " · " + rowcount + " row" + (rowcount === 1 ? "" : "s") + queryPreview;
    return { id: "scratch-" + i, kind: "query_result", body, meta };
  });
};

// Map a polled job's stage to a UI phase. The new backend exposes a `stage`
// field; if absent (legacy job rows from before the triage rollout), fall
// back to inferring from status.
const _stageToPhase = (job) => {
  const stage = job.stage || (job.status === "running" ? (job.triage_brief ? "investigation" : "triage") : job.status);
  switch (stage) {
    case "queued":        return { phase: "decomposing", message: "Starting up" };
    case "triage":        return { phase: "decomposing", message: "Reading your question" };
    case "investigation": return { phase: "retrieving",  message: "Pulling the data" };
    case "synthesis":     return { phase: "synthesizing", message: "Writing the answer" };
    default:              return { phase: stage, message: stage };
  }
};

// queryBJL — email/insights path. POST -> poll -> emit V2's expected events.
// Triage-aware: sends prior_conversation_context if provided; surfaces
// triage_brief, followup_chips, clarifying_question via onDone.
const queryBJL = async ({
  query, intentHint, strategistContext, waldoContext, debug = false,
  priorConversationContext = null,
  onStatus = () => {}, onChunk = () => {}, onDone = () => {},
  onError = () => {}, onDebug = () => {}, onEvidence = () => {},
  endpoint = "/api/bjl-query", signal,
}) => {
  let enqueueRes;
  try {
    enqueueRes = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        query, intentHint, strategistContext, waldoContext, debug,
        mode: "email",
        prior_conversation_context: priorConversationContext,
      }),
      signal,
    });
  } catch (err) { onError({ message: err.message, phase: "fetch" }); return; }

  if (!enqueueRes.ok && enqueueRes.status !== 202) {
    let errBody;
    try { errBody = await enqueueRes.json(); } catch { errBody = { error: enqueueRes.statusText }; }
    onError({ message: errBody.error || "Enqueue failed", phase: "http", status: enqueueRes.status });
    return;
  }

  let enqueue;
  try { enqueue = await enqueueRes.json(); } catch { onError({ message: "Invalid enqueue response", phase: "fetch" }); return; }
  if (!enqueue || !enqueue.job_id) { onError({ message: "Enqueue returned no job_id", phase: "fetch" }); return; }

  if (debug) onDebug({ job_id: enqueue.job_id, phase: "enqueued" });
  onStatus(_stageToPhase({ status: "pending" }));

  let job;
  try {
    job = await _bjlPollJob(enqueue.job_id, signal, {
      onTransition: (j) => onStatus(_stageToPhase(j)),
      onPollError: (e) => { if (debug) onDebug(e); }
    });
  } catch (err) { onError({ message: err.message, phase: err.phase || "poll", job_id: err.job_id || enqueue.job_id }); return; }

  if (job.status === "error") {
    onError({ message: job.error || "Investigation failed", phase: "investigation", job_id: enqueue.job_id, finding: job.finding || null, scratch: job.scratch || null });
    return;
  }

  // Clarification path: triage flagged the question as ambiguous. Surface the
  // clarifying_question to the caller via onDone with a clarifying flag.
  if (job.status === "clarification_needed") {
    try {
      onDone({
        clarification_needed: true,
        clarifying_question: job.clarifying_question || "",
        triage_brief: job.triage_brief || null,
        followup_chips: [],
        finding: "",
        query_count: 0,
        job_id: enqueue.job_id,
        completed_at: job.completed_at,
      });
    } catch (e) { console.error("[queryBJL] onDone threw:", e); }
    return;
  }

  onStatus(_stageToPhase({ status: "running", triage_brief: job.triage_brief })); // synthesizing-ish
  const evidenceRows = _bjlScratchToEvidenceRows(job.scratch);
  try { onEvidence({ rows: evidenceRows }); } catch (e) { console.error("[queryBJL] onEvidence threw:", e); }

  const finding = job.finding || "";
  try { onChunk(finding); } catch (e) { console.error("[queryBJL] onChunk threw:", e); }
  const qc1 = job.query_count || (Array.isArray(job.scratch) ? job.scratch.length : 0);
  try {
    onDone({
      finding,
      query_count: qc1,
      queryBudgetUsed: qc1,
      job_id: enqueue.job_id,
      completed_at: job.completed_at,
      triage_brief: job.triage_brief || null,
      followup_chips: Array.isArray(job.followup_chips) ? job.followup_chips : [],
    });
  } catch (e) { console.error("[queryBJL] onDone threw:", e); }
};

// investigateQuery — Intelligence mode. POST -> poll -> emit notes per scratch
// entry, project scratch into evidence rows, fire chunk(finding), then done.
// The SSE-era two-leg flow (mode=investigate then mode=synthesize) collapses
// into a single job; the polling backend handles triage + investigation +
// synthesis. Triage-aware: sends prior_conversation_context for follow-up
// recognition, exposes triage_brief and followup_chips via onDone, handles
// the clarification_needed bypass.
const investigateQuery = async ({
  question, intent = null, debug = false,
  priorConversationContext = null,
  onStatus = () => {}, onNote = () => {}, onChunk = () => {}, onDone = () => {},
  onError = () => {}, onDebug = () => {}, onEvidence = () => {},
  endpoint = "/api/bjl-query", signal,
}) => {
  let enqueueRes;
  try {
    enqueueRes = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        query: question, intent, mode: "investigate", debug,
        prior_conversation_context: priorConversationContext,
      }),
      signal,
    });
  } catch (err) { onError({ message: err.message, phase: "fetch" }); return; }

  if (!enqueueRes.ok && enqueueRes.status !== 202) {
    let errBody;
    try { errBody = await enqueueRes.json(); } catch { errBody = { error: enqueueRes.statusText }; }
    onError({ message: errBody.error || "Enqueue failed", phase: "http", status: enqueueRes.status });
    return;
  }

  let enqueue;
  try { enqueue = await enqueueRes.json(); } catch { onError({ message: "Invalid enqueue response", phase: "fetch" }); return; }
  if (!enqueue || !enqueue.job_id) { onError({ message: "Enqueue returned no job_id", phase: "fetch" }); return; }

  if (debug) onDebug({ job_id: enqueue.job_id, phase: "enqueued" });
  onStatus(_stageToPhase({ status: "pending" }));

  let job;
  try {
    job = await _bjlPollJob(enqueue.job_id, signal, {
      onTransition: (j) => onStatus(_stageToPhase(j)),
      onPollError: (e) => { if (debug) onDebug(e); }
    });
  } catch (err) { onError({ message: err.message, phase: err.phase || "poll", job_id: err.job_id || enqueue.job_id }); return; }

  if (job.status === "error") {
    onError({ message: job.error || "Investigation failed", phase: "investigation", job_id: enqueue.job_id, finding: job.finding || null, scratch: job.scratch || null });
    return;
  }

  // Clarification path: triage flagged the question as ambiguous. Skip
  // notes/evidence/chunks; surface the clarifying_question via onDone.
  if (job.status === "clarification_needed") {
    try {
      onDone({
        clarification_needed: true,
        clarifying_question: job.clarifying_question || "",
        triage_brief: job.triage_brief || null,
        followup_chips: [],
        finding: "",
        query_count: 0,
        job_id: enqueue.job_id,
        completed_at: job.completed_at,
      });
    } catch (e) { console.error("[investigateQuery] onDone threw:", e); }
    return;
  }

  // Replay scratch as notes so the UI's note feed populates with what the
  // investigator did. Each scratch entry's rationale becomes one note.
  const scratch = Array.isArray(job.scratch) ? job.scratch : [];
  for (const s of scratch) {
    const note = (s && s.rationale) ? String(s.rationale).trim() : "";
    if (note) {
      try { onNote({ note }); } catch (e) { console.error("[investigateQuery] onNote threw:", e); }
    }
  }

  // Project scratch into evidence rows so the drawer populates.
  try { onEvidence({ rows: _bjlScratchToEvidenceRows(scratch) }); } catch (e) { console.error("[investigateQuery] onEvidence threw:", e); }

  // Synthesizing phase
  onStatus(_stageToPhase({ status: "running", triage_brief: job.triage_brief, stage: "synthesis" }));
  const finding = job.finding || "";
  try { onChunk(finding); } catch (e) { console.error("[investigateQuery] onChunk threw:", e); }

  const qc = job.query_count || scratch.length;
  try {
    onDone({
      finding,
      query_count: qc,
      queryBudgetUsed: qc,
      job_id: enqueue.job_id,
      completed_at: job.completed_at,
      triage_brief: job.triage_brief || null,
      followup_chips: Array.isArray(job.followup_chips) ? job.followup_chips : [],
      investigation: { scratch }
    });
  } catch (e) { console.error("[investigateQuery] onDone threw:", e); }
};

/* =========================================================================
 * 4. generateOneEmail — ported verbatim from frontend_patch_v4.js.
 * Calls /api/claude. Applies validateCredentials + sanitizeEmail.
 * ========================================================================= */
const generateOneEmail = async ({
  contactName, company, waldoContext, insights,
  userStrategistContext, userEmailInstructions, audienceModeValue,
  waldoAccount, prospectCategory, batchIndex,
}) => {
  // Pick the 2-3 most relevant case studies for this prospect.
  let formattedCaseStudies = "";
  try {
    const prospectContext = extractProspectContext({
      waldo: waldoAccount || null,
      bjlInsights: insights || "",
      strategistContext: userStrategistContext || "",
      prospectCategory: prospectCategory || null,
    });
    const relevantCases = await filterCaseStudies(prospectContext, 3);
    // BATCH ROTATION: which case study is primary depends on contact index
    // within the account. Ensures multiple contacts at the same account don't
    // all cite the same case study. Single-contact mode (batchIndex=0) is a
    // no-op: the top-ranked case study stays primary.
    const rotateBy = relevantCases.length > 0
      ? ((Number.isFinite(batchIndex) ? batchIndex : 0) % relevantCases.length + relevantCases.length) % relevantCases.length
      : 0;
    const rotatedCases = rotateBy === 0
      ? relevantCases
      : [...relevantCases.slice(rotateBy), ...relevantCases.slice(0, rotateBy)];
    formattedCaseStudies = formatCaseStudiesForPrompt(rotatedCases);
  } catch (e) {
    // On failure (e.g., library.json fetch error), fall through with empty case
    // studies; buildEmailSystem will instruct the model to use credentials only.
    formattedCaseStudies = "";
  }
  const EMAIL_SYSTEM = buildEmailSystem(userEmailInstructions, formattedCaseStudies);
  let userMsg = "";
  if (insights && insights.trim()) userMsg += "[BJL INSIGHTS — choose the single most relevant]\n" + insights.trim() + "\n\n";
  if (waldoContext) userMsg += "[WALDO INTELLIGENCE]\n" + waldoContext + "\n\n";
  if (userStrategistContext && userStrategistContext.trim()) userMsg += "[STRATEGIST CONTEXT]\n" + userStrategistContext.trim() + "\n\n";
  userMsg += "[Prospect] " + contactName + " at " + company + "\n";
  userMsg += "[Audience mode] " + (audienceModeValue || "external") + "\n";
  userMsg += "Write the outreach email for " + contactName + " at " + company + ".";
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 28000);
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      signal: ctrl.signal,
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514", max_tokens: 800,
        system: EMAIL_SYSTEM,
        messages: [{ role: "user", content: userMsg }],
      }),
    });
    clearTimeout(timer);
    if (res.status !== 200) {
      let errData; try { errData = await res.json(); } catch { errData = null; }
      const errMsg = errData?.error?.message
        || (res.status === 429 ? "Rate limit hit — increase delay between calls" : "API error " + res.status);
      return { text: "", error: errMsg };
    }
    const data = await res.json();
    const rawText = data.content?.map(b => b.type === "text" ? b.text : "").filter(Boolean).join("\n") || "";
    const validated = await validateCredentials(rawText, userStrategistContext);
    return { text: sanitizeEmail(validated), error: null };
  } catch (e) { return { text: "", error: e.name === "AbortError" ? "Timed out" : e.message }; }
};

const parseSubjectBody = (text) => {
  const m = text.match(/Subject(?:\s*line)?\s*:\s*(.+)/i);
  const subject = m ? m[1].replace(/^[*_]+|[*_]+$/g, "").trim() : "";
  const body = text.replace(/Subject(?:\s*line)?\s*:.*\n?/i, "").trim();
  return { subject, body };
};

/* =========================================================================
 * 5. Minimal markdown-to-React renderer for the Intelligence prose stream.
 * Handles headings, unordered + ordered lists, blockquotes, paragraphs,
 * **bold**, *italic*, `code`, and --- rules. Not a full CommonMark impl.
 * ========================================================================= */
const renderInline = (s) => {
  // Escape HTML, then apply inline markdown. Return an array of React nodes.
  const parts = [];
  let i = 0;
  const re = /(\*\*[^*]+\*\*|\*[^*]+\*|_[^_]+_|`[^`]+`|\[([^\]]+)\]\(([^)]+)\))/g;
  let m;
  let lastIdx = 0;
  while ((m = re.exec(s)) !== null) {
    if (m.index > lastIdx) parts.push(s.slice(lastIdx, m.index));
    const tok = m[0];
    if (tok.startsWith("**")) parts.push(<strong key={parts.length}>{tok.slice(2, -2)}</strong>);
    else if (tok.startsWith("`")) parts.push(<code key={parts.length}>{tok.slice(1, -1)}</code>);
    else if (tok.startsWith("[")) parts.push(<a key={parts.length} href={m[3]} target="_blank" rel="noreferrer">{m[2]}</a>);
    else parts.push(<em key={parts.length}>{tok.slice(1, -1)}</em>);
    lastIdx = m.index + tok.length;
  }
  if (lastIdx < s.length) parts.push(s.slice(lastIdx));
  return parts;
};

const renderMarkdown = (text) => {
  if (!text) return [];
  const lines = text.split("\n");
  const nodes = [];
  let i = 0;
  let key = 0;
  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();
    if (!trimmed) { i++; continue; }
    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) { nodes.push(<hr key={key++} />); i++; continue; }
    // Heading
    const hMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      const level = Math.min(hMatch[1].length, 3); // clamp to h1/h2/h3
      const Tag = `h${level}`;
      nodes.push(<Tag key={key++}>{renderInline(hMatch[2])}</Tag>);
      i++; continue;
    }
    // Blockquote (consume consecutive > lines)
    if (/^>\s?/.test(trimmed)) {
      const qLines = [];
      while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
        qLines.push(lines[i].trim().replace(/^>\s?/, ""));
        i++;
      }
      nodes.push(<blockquote key={key++}><p>{renderInline(qLines.join(" "))}</p></blockquote>);
      continue;
    }
    // Ordered list (1. 2. 3.)
    if (/^\d+[.)]\s+/.test(trimmed)) {
      const items = [];
      while (i < lines.length && /^\d+[.)]\s+/.test(lines[i].trim())) {
        items.push(lines[i].trim().replace(/^\d+[.)]\s+/, ""));
        i++;
      }
      nodes.push(<ol key={key++}>{items.map((it, j) => <li key={j}>{renderInline(it)}</li>)}</ol>);
      continue;
    }
    // Unordered list (- or *)
    if (/^[-*]\s+/.test(trimmed)) {
      const items = [];
      while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
        items.push(lines[i].trim().replace(/^[-*]\s+/, ""));
        i++;
      }
      nodes.push(<ul key={key++}>{items.map((it, j) => <li key={j}>{renderInline(it)}</li>)}</ul>);
      continue;
    }
    // Pipe table: header line of "| col | col |", separator "|---|---|", then data rows.
    // Splits cells on | and trims; handles leading/trailing pipes. Alignment hints (:---,
    // ---:, :---:) in the separator are detected and applied as text-align styles.
    if (trimmed.includes("|") && i + 1 < lines.length) {
      const sepRaw = lines[i + 1].trim();
      const isSep = sepRaw.includes("|") && /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(sepRaw);
      if (isSep) {
        const splitRow = (raw) => raw.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(c => c.trim());
        const headers = splitRow(trimmed);
        const aligns = splitRow(sepRaw).map(seg => {
          const left = seg.startsWith(":");
          const right = seg.endsWith(":");
          if (left && right) return "center";
          if (right) return "right";
          if (left) return "left";
          return null;
        });
        i += 2;
        const rows = [];
        while (i < lines.length) {
          const r = lines[i].trim();
          if (!r || !r.includes("|")) break;
          rows.push(splitRow(r));
          i++;
        }
        nodes.push(
          <div key={key++} className="md-table-wrap" style={{overflowX: "auto", margin: "12px 0"}}>
            <table style={{borderCollapse: "collapse", width: "100%", fontSize: "0.92em"}}>
              <thead>
                <tr>{headers.map((h, j) => (
                  <th key={j} style={{
                    textAlign: aligns[j] || "left",
                    borderBottom: "1px solid var(--grey-3, #d0d0d0)",
                    padding: "6px 10px",
                    fontWeight: 600,
                    whiteSpace: "nowrap"
                  }}>{renderInline(h)}</th>
                ))}</tr>
              </thead>
              <tbody>
                {rows.map((row, ri) => (
                  <tr key={ri}>
                    {row.map((c, ci) => (
                      <td key={ci} style={{
                        textAlign: aligns[ci] || "left",
                        borderBottom: "1px solid var(--grey-4, #ececec)",
                        padding: "5px 10px",
                        verticalAlign: "top"
                      }}>{renderInline(c)}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
        continue;
      }
    }
    // Paragraph — accumulate until blank line or block-starter
    const pLines = [line];
    i++;
    while (i < lines.length) {
      const nxt = lines[i];
      const nxtTrim = nxt.trim();
      if (!nxtTrim) break;
      if (/^(#{1,6}\s|>|[-*]\s|\d+[.)]\s|---|___|\*\*\*)/.test(nxtTrim)) break;
      pLines.push(nxt);
      i++;
    }
    nodes.push(<p key={key++}>{renderInline(pLines.join(" "))}</p>);
  }
  return nodes;
};

const INTEL_CHIPS = [

  decomposing:   "Reading your query",
  retrieving:    "Searching BJL",
};

const LOADING_CURIOSITY = "Thanks for being curious. The lab is digging.";

const FOLLOWUP_SUGGESTIONS = [
  "Tell me more about this",

const INTEL_WELCOME = "Welcome to the Brand Joy Lab. Ask about a brand, an audience, a category, or an angle. Use the tags above if you want to suggest a direction. The lab will dig.";

const IntelligenceMode = ({ setEvidenceRows, strategistContext, setStrategistContext }) => {
  const [intent, setIntent] = useState(null); // null means no chip selected
  const [prompt, setPrompt] = useState("");
  const [running, setRunning] = useState(false);
  const [phase, setPhase] = useState(null);
  const [error, setError] = useState(null);

  // Live investigation notes, appended as the investigator emits them.
  // Cleared when a new query starts; fades out when synthesis begins.
  const [notes, setNotes] = useState([]);

  // Conversation history. Preserved across follow-ups.
  const [turns, setTurns] = useState([]);
  const [currentPrompt, setCurrentPrompt] = useState("");
  const [currentStream, setCurrentStream] = useState("");
  const [currentIsFollowup, setCurrentIsFollowup] = useState(false);

  const [followupText, setFollowupText] = useState("");

  const toggleChip = useCallback((k) => {
    setIntent(prev => prev === k ? null : k);
  }, []);

  const runQuery = useCallback(async (promptText, isFollowup = false) => {
    if (!promptText.trim() || running) return;

    const prevTurns = isFollowup ? turns : [];

    setRunning(true);
    setPhase("investigating");
    setError(null);
    setEvidenceRows([]);
    setNotes([]);
    if (!isFollowup) setTurns([]);
    setCurrentPrompt(promptText.trim());
    setCurrentStream("");
    setCurrentIsFollowup(isFollowup);

    // Build prior_conversation_context for triage. Last 3-5 turns. For each
    // assistant turn, send a SUMMARY (200-400 chars) plus the triage_brief
    // it produced, so triage can recognize follow-ups vs new questions.
    const buildPriorConversationContext = (history) => {
      const recent = (Array.isArray(history) ? history : []).slice(-5);
      const ctx = [];
      for (const t of recent) {
        if (t && t.prompt) {
          ctx.push({ role: "user", content: String(t.prompt) });
        }
        if (t && t.response) {
          const resp = String(t.response).trim();
          const summary = resp.length > 400 ? resp.slice(0, 380) + "…" : resp;
          ctx.push({
            role: "assistant",
            content_summary: summary,
            triage_brief_summary: t.triage_brief
              ? {
                  the_question: t.triage_brief.the_question || null,
                  investigation_depth: t.triage_brief.investigation_depth || null,
                }
              : null,
          });
        }
      }
      return ctx.length ? ctx : null;
    };

    const priorContext = isFollowup ? buildPriorConversationContext(prevTurns) : null;

    await investigateQuery({
      question: promptText.trim(),
      intent: intent || null,
      priorConversationContext: priorContext,
      onStatus: ({ phase }) => setPhase(phase),
      onNote: ({ note }) => setNotes(prev => [...prev, note]),
      onEvidence: ({ rows }) => setEvidenceRows(rows || []),
      onChunk: (text) => setCurrentStream(prev => prev + text),
      onDone: (info) => {
        setRunning(false);
        setPhase(null);
        // Clarification bypass: render the clarifying question as the
        // assistant's response for this turn. No follow-up chips on this
        // state — the user types a clarifying answer in the input box.
        if (info && info.clarification_needed) {
          setCurrentStream("");
          setTurns(prev => [...prev, {
            prompt: promptText.trim(),
            response: info.clarifying_question || "(clarification requested)",
            triage_brief: info.triage_brief || null,
            followup_chips: [],
            isClarification: true,
            isFollowup,
          }]);
          setCurrentPrompt("");
          return;
        }
        setCurrentStream(finalStream => {
          setTurns(prev => [...prev, {
            prompt: promptText.trim(),
            response: finalStream,
            investigationMeta: info || null,
            triage_brief: (info && info.triage_brief) || null,
            followup_chips: (info && Array.isArray(info.followup_chips)) ? info.followup_chips : [],
            isFollowup,
          }]);
          return "";
        });
        setCurrentPrompt("");
      },
      onError: ({ message, phase }) => {
        setError(`${phase || "error"}: ${message}`);
        setRunning(false);
        setPhase(null);
        setCurrentPrompt("");
        setCurrentStream("");
      },
    });
  }, [intent, strategistContext, running, turns, setEvidenceRows]);

  const run = useCallback(() => runQuery(prompt, false), [runQuery, prompt]);
  const runFollowup = useCallback(() => {
    if (!followupText.trim()) return;
    const text = followupText;
    setFollowupText("");
    runQuery(text, true);
  }, [followupText, runQuery]);

  const clearConversation = useCallback(() => {
    setTurns([]);
    setCurrentPrompt("");
    setCurrentStream("");
    setError(null);
    setEvidenceRows([]);
  }, [setEvidenceRows]);

  const copyConversation = useCallback(() => {
    const all = turns.map((t, i) =>
      `Q${i + 1}${t.isFollowup ? " (follow-up)" : ""}: ${t.prompt}\n\n${t.response.trim()}`
    ).join("\n\n---\n\n");
    navigator.clipboard.writeText(all);
  }, [turns]);

  const lastTurn = turns[turns.length - 1];
  const investigationMeta = lastTurn?.investigationMeta || null;
  const docOpen = running || turns.length > 0 || error;
  const showNotes = running && phase !== "synthesizing" && notes.length > 0;

  return (
    <div className="canvas">
      <div className="brief-scroll">
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 22}}>
          <div>
            <div className="eyebrow" style={{marginBottom: 6}}>Intelligence engine</div>
            <div className="display" style={{fontSize: 48, letterSpacing: "-0.01em"}}>Ask the Lab.</div>
            <div style={{marginTop: 8, color: "var(--grey-2)", maxWidth: "52ch", fontSize: 14}}>
              {INTEL_WELCOME}
            </div>
          </div>
          <div className="mono" style={{color: "var(--grey-2)", textAlign: "right"}}>
            session · {new Date().toISOString().slice(0,10)}<br/>
            v2 · investigator
          </div>
        </div>

        <div className="commission">
          <div className="commission-head">
            <div className="step">Ask the Lab</div>
            <div className="mono" style={{color: "var(--grey-2)"}}>
              {intent ? INTEL_CHIPS.find(c => c.k === intent).label.toUpperCase() : "NO TAG"}
            </div>
          </div>
          <div className="intent-chips" style={{display: "flex", flexWrap: "wrap", gap: 8, padding: "12px 16px"}}>
            {INTEL_CHIPS.map(c => (
              <button key={c.k} type="button"
                className={`chip ${c.tag} ${intent === c.k ? "active" : ""}`}
                aria-pressed={intent === c.k}
                onClick={() => toggleChip(c.k)}
                style={{
                  padding: "6px 14px",
                  borderRadius: 999,
                  border: "1px solid var(--grey-1)",
                  background: intent === c.k ? "var(--accent)" : "transparent",
                  color: intent === c.k ? "var(--bg)" : "var(--grey-2)",
                  fontSize: 12,
                  letterSpacing: 0.2,
                  cursor: "pointer",
                  transition: "all .15s ease",
                }}>
                {c.label}
              </button>
            ))}
          </div>
          <div className="commission-body">
            <textarea className="commission-prompt" rows={3}
              value={prompt} onChange={e => setPrompt(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); run(); } }}
              placeholder="Ask anything. Brand, audience, category, angle."
            />
            <div className="aux fade-in">
              <div className="aux-cell">
                <div className="aux-label">
                  <span>Strategist context</span>
                  <span style={{color: "var(--grey-1)"}}>optional</span>
                </div>
                <textarea
                  placeholder="Internal context the lab should factor in — known pitches, client relationships, past work."
                  value={strategistContext}
                  onChange={e => setStrategistContext(e.target.value)}
                />
              </div>
            </div>
          </div>
          <div className="commission-foot">
            <div className="meta">
              <span><b>Investigator</b> Sonnet</span>
              <span><b>Synthesis</b> Opus</span>
              <span><b>Est.</b> 12-25s</span>
            </div>
            <div style={{display: "flex", gap: 8}}>
              <button className="btn primary" onClick={run} disabled={running || !prompt.trim()}>
                {running ? "Digging…" : "Go"}
              </button>
            </div>
          </div>
        </div>

        {docOpen ? (
          <article className="intel-doc-shell fade-in">
            <div className="doc-head">
              <div className="doc-meta">
                <span><b>Tag</b> {intent ? INTEL_CHIPS.find(c => c.k === intent).label : "none"}</span>
                <span><b>Investigation</b> {investigationMeta
                  ? `${investigationMeta.queryBudgetUsed || 0} queries${investigationMeta.stoppedEarly ? " · stopped at budget" : ""}`
                  : running ? "running…" : "—"}</span>
              </div>
              <div className="doc-actions">
                <button className="icon-btn" title="Clear conversation" onClick={clearConversation} disabled={running || turns.length === 0}><Icon name="regen" /></button>
                <button className="icon-btn" title="Copy full conversation" onClick={copyConversation} disabled={turns.length === 0}><Icon name="copy" /></button>
                <button className="btn ghost" onClick={() => window.print()}><Icon name="download" size={12} /> Export PDF</button>
              </div>
            </div>
            {error && <div className="phase-pill err"><span className="dot" /> {error}</div>}
            {running && <div className="phase-pill curiosity"><span className="dot" /> {LOADING_CURIOSITY}{phase ? ` · ${PHASE_LABEL[phase] || phase}` : ""}</div>}

            {showNotes && (
              <div className="investigation-notes fade-in" style={{
                padding: "12px 16px",
                borderLeft: "2px solid var(--grey-1)",
                margin: "8px 0 20px",
                color: "var(--grey-2)",
                fontSize: 13,
                fontFamily: "var(--mono, monospace)",
              }}>
                {notes.map((n, i) => (
                  <div key={i} style={{marginBottom: 4, opacity: i === notes.length - 1 ? 1 : 0.6}}>
                    {i === notes.length - 1 ? "› " : "  "}{n}
                  </div>
                ))}
              </div>
            )}

            {turns.map((t, i) => {
              const isLastCompleted = i === turns.length - 1 && !running;
              const chips = (t.followup_chips || []).filter(c => typeof c === "string" && c.trim());
              return (
                <div key={i} className="turn">
                  <div className="turn-head">
                    <span className="turn-idx">Q{i + 1}{t.isFollowup ? " · follow-up" : ""}{t.isClarification ? " · clarification" : ""}</span>
                    <span className="turn-prompt">{t.prompt}</span>
                  </div>
                  <div className="stream-doc">
                    {renderMarkdown(t.response)}
                  </div>
                  {/* Triage-provided followup chips. Only on the last turn so the
                      conversation feed stays clean. Clicking a chip submits it
                      as the next follow-up question. */}
                  {isLastCompleted && chips.length > 0 && (
                    <div className="followup-chips fade-in">
                      {chips.slice(0, 3).map((chip, ci) => (
                        <button key={ci} type="button"
                          className="followup-chip"
                          onClick={() => runQuery(chip, true)}
                          disabled={running}>
                          {chip}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}

            {running && currentPrompt && (
              <div className="turn turn-active">
                <div className="turn-head">
                  <span className="turn-idx">Q{turns.length + 1}{currentIsFollowup ? " · follow-up" : ""}</span>
                  <span className="turn-prompt">{currentPrompt}</span>
                </div>
                <div className="stream-doc">
                  {renderMarkdown(currentStream)}
                  <span className="streaming-cursor" />
                </div>
              </div>
            )}

            {!running && turns.length > 0 && !error && (() => {
              const lastTurn = turns[turns.length - 1];
              const hasTriageChips = lastTurn && Array.isArray(lastTurn.followup_chips) && lastTurn.followup_chips.length > 0;
              return (
                <div className="followup fade-in">
                  <div className="followup-label">Stay curious. Ask a follow-up.</div>
                  {/* Static suggestion pills hidden when triage provided chips
                      above, since those are contextual and stronger. The typed-
                      follow-up input below is always available either way. */}
                  {!hasTriageChips && (
                    <div className="followup-pills">
                      {FOLLOWUP_SUGGESTIONS.map(s => (
                        <button key={s} className="followup-pill" type="button"
                          onClick={() => setFollowupText(s)}>
                          {s}
                        </button>
                      ))}
                    </div>
                  )}
                  <div className="followup-row">
                    <input type="text" className="followup-input"
                      value={followupText}
                      onChange={(e) => setFollowupText(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); runFollowup(); } }}
                      placeholder="Ask a follow-up…" />
                    <button className="btn primary" onClick={runFollowup}
                      disabled={!followupText.trim()}>Go</button>
                  </div>
                </div>
              );
            })()}
          </article>
        ) : (
          <div className="doc-placeholder">Output appears here after you ask the Lab a question.</div>
        )}
      </div>
    </div>
  );
};

const normalizeContact = (c) => {
  if (!c) return null;
  if (typeof c === "string") return { name: c, role: "", email: "" };
  return { name: c.name || c.full_name || "", role: c.role || c.title || "", email: c.email || "", seniority: c.seniority || "" };
};

const contactSignalLabel = (account, contactName) => {
  const mapping = account?.contact_signal_mapping;
  if (!mapping || !contactName) return null;
  if (Array.isArray(mapping)) {
    const hit = mapping.find(m => (m.contact || m.name) === contactName);
    if (hit) return hit.signal_ref || hit.signal || "signal";
  } else if (typeof mapping === "object") {
    const hit = mapping[contactName];
    if (hit) return typeof hit === "string" ? hit : (hit.signal_ref || hit.signal || "signal");
  }
  return null;
};

// Parse the orchestrator's email_findings output into 4-5 structured findings.
// The synthesis prompt says each finding has: (1) behavioral observation,
// (2) supporting data in parens, (3) outreach implication. The format the
// model actually emits is numbered list-ish. Tolerate variation.
const parseFindings = (raw) => {
  if (!raw) return [];
  const lines = raw.split("\n");
  const findings = [];
  let current = null;
  for (const line of lines) {
    const numMatch = line.match(/^\s*(\d+)[.)]\s+(.*)$/);
    if (numMatch) {
      if (current) findings.push(current);
      current = { idx: numMatch[1].padStart(2, "0"), headline: numMatch[2].trim(), body: "", implication: "" };
      continue;
    }
    if (!current) continue;
    const implMatch = line.match(/^\s*(?:outreach\s+)?implication\s*:\s*(.*)$/i);
    if (implMatch) { current.implication = implMatch[1].trim(); continue; }
    if (line.trim()) {
      if (current.body) current.body += " " + line.trim();
      else current.body = line.trim();
    }
  }
  if (current) findings.push(current);
  // If nothing parsed cleanly, emit a single "raw" finding so the user can still read it.
  if (findings.length === 0) {
    findings.push({ idx: "01", headline: "Findings", body: raw.trim(), implication: "" });
  }
  return findings;
};

  const ready = accounts.filter(a => accountStatus[a.id] === "ready").length;
  const totalContacts = accounts.reduce((n, a) => n + ((a.contacts || []).length || 0), 0);
  const eligibleContacts = accounts
    .filter(a => accountStatus[a.id] === "ready")
    .reduce((n, a) => n + ((a.contacts || []).length || 0), 0);

  const loadFile = async (file) => {

      setAccountStatus(initStatus);
      setAccountInsights({});
      setResults({});
      setExpanded(new Set());

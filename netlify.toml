[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.claude]
  timeout = 26

[functions.bjl-query]
  timeout = 26

[functions.bjl-query-status]
  timeout = 26

# Background function — Netlify gives any function whose filename ends with
# -background.js a 15-minute timeout automatically. No included_files
# declaration: the prompt and schema content is bundled via require() of
# netlify/functions/_prompts_bundle.json (generated by
# bin/build_prompts_bundle.js). esbuild inlines JSON requires reliably;
# included_files is silently ignored under the esbuild bundler.

[context.production.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/bjl-query"
  to = "/.netlify/functions/bjl-query"
  status = 200

[[redirects]]
  from = "/api/bjl-query-status"
  to = "/.netlify/functions/bjl-query-status"
  status = 200

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions.claude]
  timeout = 26

[functions.bjl-query]
  timeout = 26
  # pg-native and pg-cloudflare are optional pg peers esbuild would choke on
  # while trying to resolve dynamic requires; pg itself stays bundled.
  external_node_modules = ["pg-native", "pg-cloudflare"]
  included_files = ["node_modules/pg/**"]

[context.production.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/bjl-query"
  to = "/.netlify/functions/bjl-query"
  status = 200

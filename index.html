// ── queryBJL — SSE streaming client for the v2 orchestrator (/api/bjl-query) ──
// Mirror of src/bjlClient.js, inlined here because this page uses runtime-Babel
// (no ES module imports). Keep in sync with src/bjlClient.js when tuning the parser.
async function queryBJL({
  query,
  intentHint,
  strategistContext,
  waldoContext,
  debug = false,
  onStatus = () => {},
  onChunk = () => {},
  onDone = () => {},
  onError = () => {},
  onDebug = () => {},
  endpoint = "/api/bjl-query",
  signal,
}) {
  let response;
  try {
    response = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, intentHint, strategistContext, waldoContext, debug }),
      signal,
    });
  } catch (err) {
    onError({ message: err.message, phase: "fetch" });
    return;
  }

  if (!response.ok) {
    let errorBody;
    try { errorBody = await response.json(); } catch { errorBody = { error: response.statusText }; }
    onError({ message: errorBody.error || "Request failed", phase: "http", status: response.status });
    return;
  }

  if (!response.body) {
    onError({ message: "No response body", phase: "stream" });
    return;
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Parse SSE frames: each event is "event: X\ndata: Y\n\n"
      let frameEnd;
      while ((frameEnd = buffer.indexOf("\n\n")) !== -1) {
        const frame = buffer.slice(0, frameEnd);
        buffer = buffer.slice(frameEnd + 2);

        const lines = frame.split("\n");
        let eventType = "message";
        let data = "";
        for (const line of lines) {
          if (line.startsWith("event: ")) eventType = line.slice(7);
          else if (line.startsWith("data: ")) data += line.slice(6);
        }

        if (!data) continue;

        let parsed;
        try { parsed = JSON.parse(data); } catch { continue; }

        switch (eventType) {
          case "status": onStatus(parsed); break;
          case "chunk":  onChunk(parsed.text); break;
          case "done":   onDone(parsed); break;
          case "error":  onError(parsed); break;
          case "debug":  onDebug(parsed); break;
        }
      }
    }
  } catch (err) {
    onError({ message: err.message, phase: "stream" });
  } finally {
    try { reader.releaseLock(); } catch {}
  }
}

function MsgBubble({ msg }) {
  const isUser = msg.role === "user";
  const toHtml = s => s.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--color-text-primary)">$1</strong>');

  if (isUser) {
    return (
      <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:16 }}>
        <div style={{ maxWidth:"75%",background:"#E8C54718",border:"1px solid #E8C54744",borderRadius:"var(--border-radius-lg) var(--border-radius-lg) 4px var(--border-radius-lg)",padding:"10px 14px" }}>
          <p style={{ margin:0,fontSize:13,color:"var(--color-text-primary)",lineHeight:1.5 }}>{msg.content}</p>
          <p style={{ margin:"4px 0 0",fontSize:10,color:"#E8C54788" }}>{msg.time}</p>
        </div>
      </div>
    );
  }

  const splitIdx = msg.content.search(/WHERE TO GO NEXT/i);
  const main = splitIdx > -1 ? msg.content.slice(0, splitIdx).trim() : msg.content.trim();
  const followSection = splitIdx > -1 ? msg.content.slice(splitIdx) : "";
  const followUps = followSection.split("\n")
    .filter(l => /^\d+\./.test(l.trim()))
    .map(l => l.replace(/^\d+\.\s*/, "").replace(/^\[|\]$/g, "").trim())
    .filter(l => l.length > 15).slice(0, 3);

  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ background:"var(--color-background-secondary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"4px var(--border-radius-lg) var(--border-radius-lg) var(--border-radius-lg)",padding:"16px 20px" }}>
        {main.split("\n").map((line, i) => {
          if (!line.trim()) return <div key={i} style={{ height:4 }} />;
          if (/^#{1,3}\s/.test(line)) return <p key={i} style={{ fontSize:10,fontWeight:500,letterSpacing:".13em",textTransform:"uppercase",color:"#E8C547",margin:"16px 0 4px" }}>{line.replace(/^#+\s/,"")}</p>;
          if (/^[-•]\s/.test(line)) return (
            <div key={i} style={{ display:"flex",gap:9,marginBottom:6,alignItems:"flex-start" }}>
              <span style={{ color:"#E8C547",flexShrink:0,fontSize:8,marginTop:6 }}>◆</span>
              <span style={{ color:"var(--color-text-secondary)",lineHeight:1.65,fontSize:13 }} dangerouslySetInnerHTML={{ __html:toHtml(line.slice(2)) }} />
            </div>
          );
          if (/^\d+\.\s/.test(line)) {
            const num = line.match(/^(\d+)/)[1];
            return (
              <div key={i} style={{ display:"flex",gap:9,marginBottom:7,alignItems:"flex-start" }}>
                <span style={{ color:"#E8C547",fontWeight:500,flexShrink:0,minWidth:16,fontSize:12 }}>{num}.</span>
                <span style={{ color:"var(--color-text-secondary)",lineHeight:1.65,fontSize:13 }} dangerouslySetInnerHTML={{ __html:toHtml(line.replace(/^\d+\.\s/,"")) }} />
              </div>
            );
          }
          return <p key={i} style={{ color:"var(--color-text-secondary)",lineHeight:1.68,margin:"2px 0",fontSize:13 }} dangerouslySetInnerHTML={{ __html:toHtml(line) }} />;
        })}
      </div>
      {followUps.length > 0 && (
        <div style={{ marginTop:8,paddingLeft:4 }}>
          {followUps.map((q,i) => (
            <button key={i} data-followup={q}
              style={{ display:"block",width:"100%",textAlign:"left",background:"none",border:"none",borderLeft:"2px solid #E8C54744",padding:"5px 10px",color:"var(--color-text-tertiary)",fontSize:12,cursor:"pointer",fontFamily:"inherit",lineHeight:1.4,marginBottom:4,transition:"all .15s" }}
              onMouseEnter={e => { e.currentTarget.style.borderLeftColor="#E8C547"; e.currentTarget.style.color="var(--color-text-primary)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderLeftColor="#E8C54744"; e.currentTarget.style.color="var(--color-text-tertiary)"; }}>
              → {q}
            </button>
          ))}
        </div>
      )}
      <p style={{ fontSize:10,color:"var(--color-text-tertiary)",margin:"4px 0 0",paddingLeft:4 }}>{msg.time}</p>
    </div>
  );
}

      .replace(/Won'tBow/g, "Won't Bow")
      .replace(/Won’tBow/g, "Won’t Bow")
      // Strip leading ** artifact (markdown bold leaking into output)
      .replace(/^\*{1,2}\n/, '')
      .replace(/^\*{1,2}\s*/, '')
      // Strip ** from subject line if it appears there
      .replace(/^(Subject:)\*{1,2}\s*/, '$1')
      // Replace spaced em dashes with a period — preserves sentence structure
      .replace(/ — /g, '. ')
      // Replace unspaced em dash (list separator context) with period + space
      .replace(/—/g, '. ')
      // Replace spaced en dashes the same way
      .replace(/ – /g, '. ')
      // Clean up any double periods or period-comma artifacts
      .replace(/\.\s*,/g, '.')
      .replace(/\.\./g, '.')
      // Clean up spacing and capitalization from em dash replacement
      .replace(/ \. /g, '. ')
      .replace(/\. ([a-z])/g, (m, c) => '. ' + c.toUpperCase())
      .replace(/\.\s*,/g, '.')
      .replace(/\.\./g, '.')
      // Lop off https:// or http:// when followed by www. The www-prefixed URL renders
      // as a link in every modern email client and we avoid the model's habit of
      // autocapitalizing the protocol to "Https://" after a sentence-ending period.

    // DEFAULT STRUCTURE — used only when the user has not provided email instructions.

  // Strip section markers before displaying. Matches [BJL], (BJL), [CRED], (CRED)
  // with optional surrounding whitespace / trailing newline. The model occasionally
  // substitutes parentheses for the square brackets specified in the prompt, so we
  // accept both forms to keep markers from leaking into delivered emails.
  const stripMarkers = (text) => text.replace(/[\[\(]\s*(?:BJL|CRED)\s*[\]\)]\s*\n?/gi, '');
  const CRED_MARKER_RE = /[\[\(]\s*CRED\s*[\]\)]/i;
  const validateCredentials = async (emailText, strategistCtx) => {
    if (!strategistCtx || !strategistCtx.trim()) return stripMarkers(emailText);
    // If the email has no CRED marker, Haiku can't identify the credential paragraph safely — skip validation
    if (!CRED_MARKER_RE.test(emailText)) {
      console.log('[validateCredentials] No CRED marker found — skipping to avoid stripping BJL content');
      return stripMarkers(emailText);
    }
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 6000);
      // Extract only the CRED section for validation (accept [CRED] or (CRED))
      const credMatch = emailText.match(/[\[\(]\s*CRED\s*[\]\)]\s*\n?([\s\S]*?)(?=\n\n[A-Z]|\nWould|\nWorth|\nBest|\nThanks|\[Your name\]|$)/i);
      if (!credMatch) {
        return stripMarkers(emailText);
      }
      const credParagraph = credMatch[1].trim();
      const prompt = 'APPROVED SOURCE MATERIAL — the only text you may draw from:\n---\n' + strategistCtx + '\n---\n\nAGENCY CREDENTIAL PARAGRAPH TO REWRITE:\n---\n' + credParagraph + '\n---\n\nTask: Rewrite this paragraph so every specific claim, client name, and credential comes directly from the APPROVED SOURCE MATERIAL above. You may paraphrase but must not add, invent, or imply anything not in the source material. Keep it to two sentences maximum — this is an intro email. Return only the rewritten paragraph — no markers, no commentary, no subject line.';
      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: ctrl.signal,
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 600,
          system: 'You rewrite agency credential paragraphs to use only approved source material. Return only the rewritten paragraph.',
          messages: [{ role: 'user', content: prompt }]
        })
      });
      clearTimeout(timer);
      // Strip markers from the full email regardless of validation result
      const cleanEmail = stripMarkers(emailText);
      if (!res.ok) return cleanEmail;
      const data = await res.json();
      const rewrittenCred = (data.content?.map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n') || '').trim();
      if (!rewrittenCred) return cleanEmail;
      // Replace the original credential paragraph with the rewritten one in the clean email
      const result = cleanEmail.replace(credParagraph, rewrittenCred);
      return result;
    } catch(e) {
      console.error('[validateCredentials] Error:', e.name, e.message);
      return stripMarkers(emailText);
    }
  };

  const parseBatchFile = (file) => {
    return new Promise((resolve, reject) => {
      const isXLSX = file.name.match(/\.xlsx?$/i);
      const reader = new FileReader();

      // Shared contact extraction logic
      const extractContacts = (headers, rows) => {
        const h = headers.map(hh => String(hh || "").toLowerCase().trim());
        const find = (...terms) => h.findIndex(hh => terms.some(t => hh.includes(t)));
        const fullNameIdx   = find("full name");
        const firstNameIdx  = find("first name", "firstname");
        const lastNameIdx   = find("last name", "lastname");
        const titleIdx      = find("title", "role", "position");
        const companyIdx    = find("company", "org", "account");
        const emailIdx      = find("email");
        const descIdx       = find("description", "desc");
        const industriesIdx = find("industries", "industry", "sector");
        const brandsIdx     = find("associated brands", "brands");
        const contextIdx    = find("context", "notes", "intel");
        const hasName = fullNameIdx >= 0 || firstNameIdx >= 0;
        if (!hasName && companyIdx < 0) {
          throw new Error("Could not find Name or Company columns. Headers: " + h.slice(0,10).join(", "));
        }
        return rows.map(vals => {
          const get = (i) => i >= 0 && vals[i] != null ? String(vals[i]).trim() : "";
          const name = get(fullNameIdx) || [get(firstNameIdx), get(lastNameIdx)].filter(Boolean).join(" ");
          const ctxParts = [
            get(descIdx) ? "About: " + get(descIdx) : "",
            get(industriesIdx) ? "Industries: " + get(industriesIdx) : "",
            get(brandsIdx) ? "Brands: " + get(brandsIdx) : "",
            get(contextIdx),
          ].filter(Boolean);
          return { name, company: get(companyIdx), role: get(titleIdx), email: get(emailIdx), context: ctxParts.join(" | ") };
        }).filter(c => c.name || c.company);
      };

      if (isXLSX) {
        reader.onload = (e) => {
          try {
            if (!window.XLSX) { reject("SheetJS not loaded — try refreshing the page."); return; }
            const wb = window.XLSX.read(e.target.result, { type: "array" });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
            const nonEmpty = data.filter(r => r.some(c => c !== ""));
            if (nonEmpty.length < 2) { reject("Spreadsheet needs a header row and at least one contact."); return; }
            const headers = nonEmpty[0];
            const rows = nonEmpty.slice(1);
            const contacts = extractContacts(headers, rows);
            if (!contacts.length) { reject("No contacts found after the header row."); return; }
            resolve(contacts);
          } catch(err) { reject("Could not parse Excel file: " + err.message); }
        };
        reader.onerror = () => reject("File read error");
        reader.readAsArrayBuffer(file);
        return;
      }

      // CSV path
      reader.onload = (e) => {
        try {
          // CSV parsing — handles quoted fields with commas
          const parseCSVLine = (line) => {
            const cols = [];
            let cur = "", inQ = false;
            for (let i = 0; i < line.length; i++) {
              const c = line[i];
              if (c === '"' && !inQ) { inQ = true; }
              else if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; }
              else if (c === '"' && inQ) { inQ = false; }
              else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
              else { cur += c; }
            }
            cols.push(cur.trim());
            return cols;
          };

          const text = e.target.result;
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          if (lines.length < 2) { reject("File needs a header row and at least one contact."); return; }

          const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().replace(/['"]/g,"").trim());

          // Column index finders — ordered by preference
          const find = (...terms) => headers.findIndex(h => terms.some(t => h.includes(t)));

          // Support both simple CSVs and the Winmo/CRM export format
          const fullNameIdx   = find("full name");
          const firstNameIdx  = find("first name", "firstname");
          const lastNameIdx   = find("last name", "lastname");
          const titleIdx      = find("title", "role", "position");
          const companyIdx    = find("company", "org", "account");
          const emailIdx      = find("email");
          const descIdx       = find("description", "desc");
          const industriesIdx = find("industries", "industry", "sector");
          const brandsIdx     = find("associated brands", "brands", "related brands");
          const contextIdx    = find("context", "notes", "intel");

          const hasAnyName = fullNameIdx >= 0 || firstNameIdx >= 0;
          if (!hasAnyName && companyIdx < 0) {
            reject("Could not find Name or Company columns. Headers: " + headers.join(", "));
            return;
          }

          const contacts = lines.slice(1).map(line => {
            const c = parseCSVLine(line);
            const get = (i) => i >= 0 && c[i] ? c[i].trim() : "";

            // Build name — prefer Full Name, fall back to First + Last
            const name = get(fullNameIdx) || [get(firstNameIdx), get(lastNameIdx)].filter(Boolean).join(" ");

            // Build context — combine Description, Industries, Associated Brands, and any Notes
            const ctxParts = [
              get(descIdx) ? "About: " + get(descIdx) : "",
              get(industriesIdx) ? "Industries: " + get(industriesIdx) : "",
              get(brandsIdx) ? "Brands: " + get(brandsIdx) : "",
              get(contextIdx),
            ].filter(Boolean);

            return {
              name,
              company: get(companyIdx),
              role: get(titleIdx),
              email: get(emailIdx),
              context: ctxParts.join(" | "),
            };
          }).filter(c => c.name || c.company);

          if (!contacts.length) { reject("No contacts found after the header row."); return; }
          resolve(contacts);
        } catch(err) { reject("Could not parse file: " + err.message); }
      };
      reader.onerror = () => reject("File read error");
      reader.readAsText(file);
    });
  };

  // Map Waldo category strings to the nearest tool category option

    if (c.includes('sports') || c.includes('entertainment') || c.includes('live event')) return 'Sports & Entertainment';

  const buildWaldoSystemContext = (account) => {
    if (!account) return '';
    const lines = [];
    const isV2 = !!(account.deep_signals || account.top_signal?.exact_quote);

    lines.push('=== WALDO PROSPECT INTELLIGENCE ===');
    lines.push('');

    // Strategic tension / primary brief
    const tension = account.creative_tension || account.top_signal?.why_it_matters || '';
    if (tension) {
      lines.push('STRATEGIC TENSION (primary brief — the problem BJL data must speak to):');
      lines.push(tension);
      lines.push('');
    }

    // Urgency
    const urgency = account.top_signal?.urgency || 'Building';
    const urgencyGuidance = {
      'Now': 'The email should feel timely and anchored to something happening right now. Reference the top signal directly if it strengthens the outreach.',
      'Seasonal': 'Anchor the frame to the current moment without over-indexing on urgency.',
      'Building': 'Frame the opportunity as forward-looking. Do not imply a crisis that does not exist.',
    };
    lines.push('URGENCY: ' + urgency + ' — ' + (urgencyGuidance[urgency] || ''));
    lines.push('');

    // Top signal with exact quote if available
    lines.push('PRIMARY SIGNAL: ' + account.top_signal.headline);
    if (account.top_signal.detail) lines.push('Detail: ' + account.top_signal.detail);
    if (account.top_signal.exact_quote) {
      lines.push('EXACT QUOTE FROM THEIR LEADERSHIP: \"' + account.top_signal.exact_quote + '\"');
      lines.push('(If you use this quote, use it verbatim — these are their own words.)');
    }
    if (account.top_signal.why_it_matters) {
      lines.push('Why it matters: ' + account.top_signal.why_it_matters);
    }
    lines.push('');

    // Sharpened hook
    const hook = account.sharpened_hook || account.suggested_hook || '';
    if (hook) {
      lines.push('SHARPENED HOOK (directional — this leads with their own language where possible; find your own expression grounded in BJL data, do not use verbatim):');
      lines.push(hook);
      lines.push('');
    }

    // PETERMAYER positioning
    if (account.petermayer_relevance) {
      lines.push('PETERMAYER POSITIONING FOR THIS ACCOUNT:');
      lines.push(account.petermayer_relevance);
      lines.push('');
    }

    // Deep signals (v2) or signal cluster (v1)
    const deepSignals = account.deep_signals || [];
    const signalCluster = account.signal_cluster || [];

    if (deepSignals.length) {
      lines.push('DEEP SIGNALS (background intelligence — use to inform which BJL findings are most relevant; do not reference signal metadata directly in email copy):');
      deepSignals.forEach(s => {
        lines.push('  [' + s.signal_type + '] ' + s.headline);
        if (s.exact_quote) lines.push('    Exact quote: \"' + s.exact_quote + '\"');
        if (s.why_it_matters) lines.push('    Why it matters: ' + s.why_it_matters);
      });
    } else if (signalCluster.length) {
      const signalTypes = ['Consumer','Category','Business','Creative & Agency','Employee'];
      const guidance = {
        'Consumer': 'WEIGHT THESE: prioritize BJL findings about consumer behavior and joy drivers.',
        'Category': 'WEIGHT THESE: pull category-level joy benchmarks from BJL.',
        'Business': 'USE FOR CONTEXT ONLY.',
        'Creative & Agency': 'NOTE INTERNALLY: sharpen angle without referencing explicitly.',
        'Employee': 'USE FOR PERSONALIZATION: new leaders are most receptive to fresh perspective.',
      };
      lines.push('SIGNAL CLUSTER:');
      signalTypes.forEach(type => {
        const signals = signalCluster.filter(s => s.signal_type === type);
        if (signals.length) {
          lines.push('  [' + type + ' — ' + (guidance[type] || '') + ']');
          signals.forEach(s => lines.push('    • ' + s.signal));
        }
      });
    }

    lines.push('');
    lines.push('=== END WALDO INTELLIGENCE ===');
    return lines.join('\n');
  };

  const parseWaldoJSON = (text) => {
    try {
      const raw = JSON.parse(text);
      // Accept three formats:
      // 1. { accounts: [...] } — standard pilot file
      // 2. { ... single account object with id/company fields ... }
      // 3. [ ...array of account objects... ]
      let accounts;
      if (Array.isArray(raw)) {
        accounts = raw;
      } else if (raw.accounts && Array.isArray(raw.accounts)) {
        accounts = raw.accounts;
      } else if (raw.company || raw.id) {
        // Single account object — wrap it
        accounts = [raw];
      } else {
        throw new Error('No accounts array found and could not detect a single account object');
      }
      // Normalize contacts field: v2 may use contact (string) for single-contact accounts
      accounts = accounts.map(a => ({
        ...a,
        contacts: Array.isArray(a.contacts) ? a.contacts : (a.contact ? [a.contact] : []),
      }));
      return { pilot: raw.pilot || raw.company || 'Waldo Intelligence', accounts };
    } catch(e) {
      throw new Error('Invalid Waldo JSON: ' + e.message);
    }
  };

  const pullWaldoInsights = async (account) => {
    if (!account) return;
    setWaldoInsightsPulling(true);
    setWaldoInsightsReady(false);
    setWaldoInsights('');

    // Build the query the orchestrator will decompose. Mention the company,
    // category, and strategic tension so retrieval pulls evidence relevant to
    // this specific outreach. The orchestrator does the rest.
    const tension = account.creative_tension || account.top_signal?.why_it_matters || '';
    const queryParts = [
      `Pull BJL findings for outreach to ${account.company}`,
      account.category ? `(${account.category})` : '',
      tension ? `. Strategic tension: ${tension}` : '',
    ].filter(Boolean);
    const query = queryParts.join(' ').trim();

    // Stash the Waldo intel on strategistContext so the synthesis prompt sees
    // the prospect's situation when picking which findings to surface.
    const waldoCtx = buildWaldoSystemContext(account);
    const combinedContext = [strategistContext?.trim(), waldoCtx].filter(Boolean).join('\n\n');

    let streamedText = '';
    let result = null;

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 55000);

    try {
      await queryBJL({
        query,
        intentHint: 'email_findings',
        strategistContext: combinedContext || undefined,
        waldoContext: account,
        signal: ctrl.signal,
        onChunk: (text) => {
          streamedText += text;
          setWaldoInsights(streamedText);
        },
        onDone: ({ evidence_counts } = {}) => {
          result = { ok: true, evidence_counts };
        },
        onError: ({ message, phase } = {}) => {
          result = { ok: false, message, phase };
        },
      });

      if (!result || !result.ok) {
        const msg = result?.message || 'Stream ended unexpectedly';
        const phase = result?.phase ? ` [${result.phase}]` : '';
        setWaldoInsights(
          (streamedText ? streamedText + '\n\n' : '') +
          `(Insights pull failed${phase}: ${msg}. You can still generate emails without pre-pulled insights, but they will lack BJL grounding.)`
        );
      }
      setWaldoInsightsReady(true);
    } catch (e) {
      const isTimeout = e?.name === 'AbortError';
      setWaldoInsights(
        (streamedText ? streamedText + '\n\n' : '') +
        (isTimeout
          ? '(Request timed out. Try again, or proceed without pre-pulled insights.)'
          : `(Connection error: ${e.message}. You can still generate emails without pre-pulled insights.)`)
      );
      setWaldoInsightsReady(true);
    } finally {
      clearTimeout(timer);
      setWaldoInsightsPulling(false);
    }
  };

    // (The orchestrator takes a single query; multi-turn memory is not part of its contract.)
    const priorForContext = messages.slice(-MAX_HISTORY_MSGS + 1);
    const priorBlock = priorForContext.length > 0
      ? "[PRIOR CONVERSATION]\n" + priorForContext
          .map(m => (m.role === "user" ? "User: " : "Assistant: ") + m.content)
          .join("\n\n")

      .filter(Boolean).join("\n\n");

      decomposing:  "Reading your query...",
      retrieving:   "Searching BJL...",
      synthesizing: "Writing the brief...",
    };

    let streamedText = "";
    let result = null; // { ok: true, evidence_counts } | { ok: false, message, phase }

    const appendToAssistant = (delta) => {
      streamedText += delta;
      setMessages(prev => {
        if (prev.length === 0) return prev;
        const copy = prev.slice();
        const last = copy[copy.length - 1];
        if (last && last.role === "assistant") {
          copy[copy.length - 1] = { ...last, content: streamedText };
        }
        return copy;
      });
      scrollToBottom();
    };

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 55000); // client-side ceiling

        onChunk: (text) => { appendToAssistant(text); },

          result = { ok: true, evidence_counts };
        },

      } else if (!result.ok) {

                                results.push({company:waldoAccount.company,contact,text:sanitizeEmail(validatedText),error});
                                }catch(e){results.push({company:waldoAccount.company,contact,text:'',error:e.name==='AbortError'?'Timed out':e.message});}
                                setWaldoResults([...results]);
                                if(i<waldoContacts.length-1) await new Promise(r=>setTimeout(r,5000));
                              }
                              setWaldoProgress(waldoContacts.length);
                              setWaldoRunning(false);
                            }}
                              style={{flex:1,padding:"8px",background:"#E8C547",color:"#0c0b09",border:"none",borderRadius:"var(--border-radius-md)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>
                              Generate {waldoContacts.length === waldoAccount?.contacts?.length ? "all" : waldoContacts.length} email{waldoContacts.length>1?"s":""} for {waldoAccount?.company?.split(" ").slice(0,2).join(" ")}
                            </button>
                            {waldoResults.length>0&&(
                              <button onClick={exportWaldoCSV}
                                style={{padding:"8px 14px",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                                Export CSV
                              </button>
                            )}
                          </div>
                        )}
                        {waldoResults.length>0&&!waldoRunning&&(
                          <div>
                            <p style={{fontSize:10,color:"var(--color-text-tertiary)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Results — {waldoResults.filter(r=>!r.error).length}/{waldoResults.length} succeeded</p>
                            {waldoResults.map((r,i)=>(
                              <div key={i} style={{marginBottom:8,border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"10px 12px"}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                                  <span style={{fontSize:11,fontWeight:500,color:"var(--color-text-primary)"}}>{r.contact}</span>
                                  {r.error
                                    ?<span style={{fontSize:10,color:"#E87070"}}>Failed: {r.error}</span>
                                    :<button onClick={()=>navigator.clipboard.writeText(r.text)} style={{background:"none",border:"1px solid var(--color-border-tertiary)",borderRadius:4,color:"var(--color-text-tertiary)",fontSize:10,cursor:"pointer",padding:"2px 8px",fontFamily:"inherit"}}>Copy</button>}
                                </div>
                                {!r.error&&<pre style={{fontSize:11,color:"var(--color-text-secondary)",whiteSpace:"pre-wrap",lineHeight:1.6,margin:0,fontFamily:"var(--font-sans)"}}>{r.text}</pre>}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {batchMode && (
                  <div>
                    <div style={{marginBottom:14}}>
                      <p style={{fontSize:10,color:"var(--color-text-tertiary)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:6}}>Step 1 — Upload contacts</p>
                      <div style={{border:"1px dashed var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"14px",textAlign:"center"}}
                        onDragOver={e=>e.preventDefault()}
                        onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)parseBatchFile(f).then(c=>{setBatchContacts(c);setBatchError(null);setBatchInsightsReady(false);setBatchInsights("");}).catch(setBatchError);}}>
                        <input type="file" accept=".csv,.xlsx,.xls" id="bfi" style={{display:"none"}}
                          onChange={e=>{const f=e.target.files[0];if(f)parseBatchFile(f).then(c=>{setBatchContacts(c);setBatchError(null);setBatchInsightsReady(false);setBatchInsights("");}).catch(setBatchError);}} />
                        <label htmlFor="bfi" style={{cursor:"pointer",color:"var(--color-text-tertiary)",fontSize:12}}>
                          {batchContacts.length>0
                            ?<span style={{color:"#E8C547"}}>{batchContacts.length} contacts loaded — click to replace</span>
                            :<span>Drop a CSV or Excel file here, or <span style={{textDecoration:"underline"}}>click to upload</span></span>}
                        </label>
                      </div>
                      {batchError&&<p style={{color:"#E87070",fontSize:11,marginTop:6}}>{String(batchError)}</p>}
                      <p style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:6,lineHeight:1.5}}>Winmo and CRM exports work directly. Auto-detected: Full Name, Company Name, Title, Email, Description, Industries, Associated Brands.</p>
                    </div>
                    {batchContacts.length>0&&(
                      <div style={{maxHeight:100,overflowY:"auto",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",marginBottom:14}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                          <thead><tr style={{borderBottom:"1px solid var(--color-border-tertiary)"}}>
                            {["Name","Company","Role","Email"].map(h=><th key={h} style={{padding:"3px 8px",textAlign:"left",color:"var(--color-text-tertiary)",fontWeight:400,textTransform:"uppercase",fontSize:10}}>{h}</th>)}
                          </tr></thead>
                          <tbody>{batchContacts.map((c,i)=>(
                            <tr key={i} style={{borderBottom:"1px solid var(--color-border-tertiary)"}}>
                              <td style={{padding:"3px 8px",color:"var(--color-text-primary)"}}>{c.name}</td>
                              <td style={{padding:"3px 8px",color:"var(--color-text-secondary)"}}>{c.company}</td>
                              <td style={{padding:"3px 8px",color:"var(--color-text-secondary)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.role}</td>
                              <td style={{padding:"3px 8px",color:"var(--color-text-tertiary)"}}>{c.email}</td>
                            </tr>
                          ))}</tbody>
                        </table>
                      </div>
                    )}
                    {batchContacts.length>0&&(
                      <div style={{marginBottom:14,padding:"12px",background:"var(--color-background-tertiary)",borderRadius:"var(--border-radius-md)",border:"1px solid var(--color-border-tertiary)"}}>
                        <p style={{fontSize:10,color:"var(--color-text-tertiary)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Step 2 — Pull BJL insights</p>
                        <p style={{fontSize:11,color:"var(--color-text-secondary)",marginBottom:8,lineHeight:1.5}}>Describe who you are reaching out to. One pull generates shared findings used across all emails.</p>
                        <input type="text" value={batchIndustry} onChange={e=>{setBatchIndustry(e.target.value);setBatchInsightsReady(false);}}
                          placeholder="e.g. amusement parks, zoos and family attractions in the Southeast"
                          style={{width:"100%",background:"var(--color-background-secondary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-primary)",padding:"8px 11px",fontSize:12,fontFamily:"var(--font-sans)",marginBottom:8,boxSizing:"border-box"}} />
                        <button onClick={pullBatchInsights} disabled={!batchIndustry.trim()||batchInsightsPulling}
                          style={{padding:"7px 14px",background:batchInsightsReady?"var(--color-background-secondary)":"#E8C547",color:batchInsightsReady?"var(--color-text-secondary)":"#0c0b09",border:batchInsightsReady?"1px solid var(--color-border-tertiary)":"none",borderRadius:"var(--border-radius-md)",fontSize:11,fontWeight:500,cursor:"pointer",fontFamily:"inherit",opacity:!batchIndustry.trim()||batchInsightsPulling?0.5:1}}>
                          {batchInsightsPulling?"Pulling…":batchInsightsReady?"✓ Ready — re-pull":"Pull BJL Insights"}
                        </button>
                        {batchInsights&&(
                          <div style={{marginTop:10}}>
                            <textarea value={batchInsights} onChange={e=>setBatchInsights(e.target.value)}
                              style={{width:"100%",minHeight:140,background:"var(--color-background-primary)",border:"1px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-secondary)",padding:"10px 12px",fontSize:11,fontFamily:"var(--font-sans)",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",marginTop:4}} />
                            <p style={{fontSize:10,color:"var(--color-text-tertiary)",marginTop:4}}>You can edit these findings before generating.</p>
                          </div>
                        )}
                      </div>
                    )}
                    {batchInsightsReady&&(
                      <div>
                        <p style={{fontSize:10,color:"var(--color-text-tertiary)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Step 3 — Configure and generate</p>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,color:"var(--color-text-tertiary)",whiteSpace:"nowrap"}}>API speed</span>
                          {[{label:"Starter",delay:8},{label:"Tier 1",delay:3},{label:"Tier 2",delay:1}].map(({label,delay})=>(
                            <button key={delay} onClick={()=>setBatchDelay(delay)}
                              style={{padding:"4px 10px",borderRadius:"var(--border-radius-md)",border:"1px solid var(--color-border-tertiary)",background:batchDelay===delay?"#E8C547":"var(--color-background-secondary)",color:batchDelay===delay?"#0c0b09":"var(--color-text-tertiary)",fontSize:10,cursor:"pointer",textTransform:"uppercase",fontFamily:"inherit",fontWeight:batchDelay===delay?500:400}}>{label}</button>
                          ))}
                          <span style={{fontSize:10,color:"var(--color-text-tertiary)"}}>~{Math.ceil(batchContacts.length*batchDelay/60)} min for {batchContacts.length} contacts</span>
                        </div>
                        <div style={{marginBottom:10}}>
                          <label style={{...lbl,display:"block",marginBottom:4}}>Email instructions</label>
                          <textarea value={batchEmailPrompt} onChange={e=>setBatchEmailPrompt(e.target.value)}
                            placeholder={"Describe what this email should do.\n\nExamples:\n— Email 1 of 3: Friendly intro, open with the most relevant BJL finding.\n— Email 2 of 3: Kennedy Space Center follow-up.\n— Email 3 of 3: Tease the travel POV piece."}
                            style={{width:"100%",minHeight:90,background:"var(--color-background-tertiary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-primary)",padding:"10px 12px",fontSize:12,fontFamily:"var(--font-sans)",lineHeight:1.6,resize:"vertical",boxSizing:"border-box"}} />
                        </div>
                        {batchRunning?(
                          <div>
                            <div style={{height:4,background:"var(--color-background-tertiary)",borderRadius:2,marginBottom:8}}>
                              <div style={{height:"100%",background:"#E8C547",borderRadius:2,width:batchContacts.length?(batchProgress/batchContacts.length*100)+"%":"0%",transition:"width .3s"}}/>
                            </div>
                            <p style={{fontSize:11,color:"var(--color-text-tertiary)",textAlign:"center"}}>{batchProgress} of {batchContacts.length} complete…</p>
                          </div>
                        ):(
                          <div style={{display:"flex",gap:8}}>
                            <button onClick={runBatch}
                              style={{flex:1,padding:"8px",background:"#E8C547",color:"#0c0b09",border:"none",borderRadius:"var(--border-radius-md)",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>
                              Generate {batchContacts.length} Email{batchContacts.length>1?"s":""}
                            </button>
                            {batchResults.length>0&&(
                              <button onClick={exportBatchCSV}
                                style={{padding:"8px 14px",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
                                Export CSV
                              </button>
                            )}
                          </div>
                        )}
                        {batchResults.length>0&&!batchRunning&&(
                          <div style={{marginTop:12}}>
                            <p style={{fontSize:10,color:"var(--color-text-tertiary)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Results — {batchResults.filter(r=>!r.error).length}/{batchResults.length} succeeded</p>
                            {batchResults.map((r,i)=>(
                              <div key={i} style={{marginBottom:8,border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",padding:"10px 12px"}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                                  <span style={{fontSize:11,fontWeight:500,color:"var(--color-text-primary)"}}>{r.contact.name}{r.contact.company?" · "+r.contact.company:""}</span>
                                  {r.error
                                    ?<span style={{fontSize:10,color:"#E87070"}}>Failed: {r.error==="Failed to fetch"?"Connection error":r.error}</span>
                                    :<button onClick={()=>navigator.clipboard.writeText(r.text)} style={{background:"none",border:"1px solid var(--color-border-tertiary)",borderRadius:4,color:"var(--color-text-tertiary)",fontSize:10,cursor:"pointer",padding:"2px 8px",fontFamily:"inherit"}}>Copy</button>}
                                </div>
                                {!r.error&&<pre style={{fontSize:11,color:"var(--color-text-secondary)",whiteSpace:"pre-wrap",lineHeight:1.6,margin:0,fontFamily:"var(--font-sans)"}}>{r.text}</pre>}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
                {!batchMode&&!waldoAccount&&queryType==="outreach_draft"&&(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                    <div>
                      <label style={lbl}>Prospect / Company</label>
                      <input type="text" value={prospectName} onChange={e=>setProspectName(e.target.value)}
                        placeholder="e.g. Athletic Brewing, Regions Bank"
                        style={{width:"100%",background:"var(--color-background-tertiary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-primary)",padding:"8px 11px",fontSize:12,fontFamily:"var(--font-sans)"}} />
                    </div>
                    <div>
                      <label style={lbl}>Recipient Role</label>
                      <select style={selStyle} value={recipientRole} onChange={e=>setRecipientRole(e.target.value)}>
                        <option value="">Select role (optional)</option>
                        <option value="CMO">CMO</option>
                        <option value="VP Marketing">VP Marketing</option>
                        <option value="VP Fan Experience / Guest Experience">VP Fan / Guest Experience</option>
                        <option value="Corporate Partnerships">Corporate Partnerships</option>
                        <option value="Brand Manager">Brand Manager</option>
                        <option value="Other">Other</option>
                      </select>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Demographics (non-outreach modes only) */}
            {queryType !== "outreach_draft" && (
              <div>
                <button onClick={() => setShowDemo(v => !v)}
                  style={{ background:"none",border:"none",color:demoCtx?"#E8C547":"var(--color-text-tertiary)",fontSize:11,letterSpacing:".07em",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",padding:"0 0 6px",display:"flex",alignItems:"center",gap:6 }}>
                  <span>◎</span>
                  {demoCtx ? "Target: " + demoCtx : "Add demographic target"}
                  <span style={{ fontSize:9,display:"inline-block",transform:showDemo?"rotate(180deg)":"none",transition:"transform .2s" }}>▼</span>
                </button>
                {showDemo && (
                  <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:4 }}>
                    <div>
                      <label style={lbl}>Generation</label>
                      <select style={selStyle} value={generation} onChange={e => setGeneration(e.target.value)}>
                        <option value="">All</option>
                        {GENERATIONS.map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={lbl}>Gender</label>
                      <select style={selStyle} value={gender} onChange={e => setGender(e.target.value)}>
                        <option value="">All</option>
                        {GENDERS.map(g => <option key={g} value={g}>{g}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={lbl}>Income</label>
                      <select style={selStyle} value={income} onChange={e => setIncome(e.target.value)}>
                        <option value="">All</option>
                        {INCOMES.map(i => <option key={i} value={i}>{i}</option>)}
                      </select>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* Strategist Context / Prospect Context */}
            <div style={{ marginTop:10 }}>
              <button onClick={() => setShowContext(v => !v)}
                style={{ background:"none",border:"none",color:strategistContext.trim()?"#E8C547":"var(--color-text-tertiary)",fontSize:11,letterSpacing:".07em",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",padding:"0 0 6px",display:"flex",alignItems:"center",gap:6 }}>
                <span>◈</span>
                {strategistContext.trim()
                  ? (queryType === "outreach_draft" ? "Prospect context added" : "Strategist context added")
                  : (queryType === "outreach_draft" ? "What do you know about this prospect?" : "Add strategist context")}
                <span style={{ fontSize:9,display:"inline-block",transform:showContext?"rotate(180deg)":"none",transition:"transform .2s" }}>▼</span>
              </button>
              {showContext && (
                <div>
                  <textarea
                    value={strategistContext}
                    onChange={e => setStrategistContext(e.target.value)}
                    placeholder={queryType === "outreach_draft"
                      ? "What you know about this account: recent news, agency review status, mutual connections, the agency credentials you want surfaced. This is intel, not instructions."
                      : "Paste store visit journals, MRI findings, competitive audits, or any other first-party intelligence. The tool uses this to sharpen which BJL data is most relevant."}
                    style={{ width:"100%",minHeight:100,background:"var(--color-background-tertiary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-primary)",padding:"10px 12px",fontSize:12,fontFamily:"var(--font-sans)",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",marginTop:6 }}
                  />
                  {strategistContext.trim() && (
                    <button onClick={() => setStrategistContext("")}
                      style={{ background:"none",border:"none",color:"var(--color-text-tertiary)",fontSize:10,cursor:"pointer",fontFamily:"inherit",padding:"4px 0",letterSpacing:".05em" }}>
                      Clear context
                    </button>
                  )}
                </div>
              )}
            </div>

            {/* Email Instructions — only shown for outreach_draft */}
            {queryType === "outreach_draft" && (
              <div style={{ marginTop:10 }}>
                <button onClick={() => setShowEmailInstructions(v => !v)}
                  style={{ background:"none",border:"none",color:emailInstructions.trim()?"#E8C547":"var(--color-text-tertiary)",fontSize:11,letterSpacing:".07em",textTransform:"uppercase",cursor:"pointer",fontFamily:"inherit",padding:"0 0 6px",display:"flex",alignItems:"center",gap:6 }}>
                  <span>✎</span>
                  {emailInstructions.trim() ? "Email instructions set" : "Add email instructions (cadence, structure, links)"}
                  <span style={{ fontSize:9,display:"inline-block",transform:showEmailInstructions?"rotate(180deg)":"none",transition:"transform .2s" }}>▼</span>
                </button>
                {showEmailInstructions && (
                  <div>
                    <textarea
                      value={emailInstructions}
                      onChange={e => setEmailInstructions(e.target.value)}
                      placeholder={"How should this email be structured? What stage of the cadence? What links should it include?\n\nExamples:\n— Email 2 of 3: brief callback to prior note, then a relevant case study link, then a soft close. 4-6 sentences in the body.\n— Post-meeting follow-up: thank them, recap one thing they said, offer a next step.\n— Re-engagement: acknowledge time has passed, share something new since we last spoke.\n\nIf left blank, the default three-part structure (HOOK → BJL BRIDGE → CRED) will be used."}
                      style={{ width:"100%",minHeight:120,background:"var(--color-background-tertiary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-primary)",padding:"10px 12px",fontSize:12,fontFamily:"var(--font-sans)",lineHeight:1.6,resize:"vertical",boxSizing:"border-box",marginTop:6 }}
                    />
                    {emailInstructions.trim() && (
                      <button onClick={() => setEmailInstructions("")}
                        style={{ background:"none",border:"none",color:"var(--color-text-tertiary)",fontSize:10,cursor:"pointer",fontFamily:"inherit",padding:"4px 0",letterSpacing:".05em" }}>
                        Clear instructions
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* Input row */}
        <div style={{ display:"flex",gap:8,alignItems:"flex-end" }}>
          {messages.length > 0 && !showComposer && (
            <button onClick={() => setShowComposer(true)}
              style={{ flexShrink:0,background:"none",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-tertiary)",padding:"9px 11px",fontSize:11,cursor:"pointer",fontFamily:"inherit",transition:"all .15s",letterSpacing:".05em",textTransform:"uppercase" }}
              onMouseEnter={e => e.currentTarget.style.borderColor="#E8C54766"}
              onMouseLeave={e => e.currentTarget.style.borderColor="var(--color-border-tertiary)"}>
              + New topic
            </button>
          )}
          <textarea ref={textareaRef}
            value={input} onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder={selectedQT ? selectedQT.placeholder : "Ask a follow-up..."}
            rows={1}
            style={{ flex:1,background:"var(--color-background-secondary)",border:"1px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",color:"var(--color-text-primary)",padding:"9px 13px",fontSize:13,fontFamily:"var(--font-sans)",lineHeight:1.5,resize:"none",transition:"border-color .18s" }} />
          <button onClick={() => send()} disabled={!input.trim() || loading}
            style={{ flexShrink:0,background:"#E8C547",color:"#0c0b09",border:"none",padding:"9px 18px",fontSize:12,fontWeight:500,letterSpacing:".08em",textTransform:"uppercase",cursor:"pointer",borderRadius:"var(--border-radius-md)",transition:"all .15s",fontFamily:"inherit",opacity:(!input.trim()||loading)?0.35:1 }}>
            Send
          </button>
        </div>
        <p style={{ fontSize:10,color:"var(--color-text-tertiary)",margin:"6px 0 0" }}>
          Enter to send · Shift+Enter for new line · Session saved automatically
        </p>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(BJLTool));
  </script>
</body>
</html>
